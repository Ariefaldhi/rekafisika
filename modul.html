<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelajah Materi | FisikaLab</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            500: '#3B82F6', // Blue 500
                            600: '#2563EB', // Blue 600
                        },
                        ui: {
                            bg: '#F8FAFC', // Slate 50
                            card: '#FFFFFF',
                            text: '#1E293B', // Slate 800
                            sub: '#64748B', // Slate 500
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Jelajah Materi</h1>
        <p class="text-sm text-slate-500 mt-1">Modul pembelajaran Fisika Matematika I</p>
    </div>

    <!-- Content -->
    <main class="px-6 py-6" id="module-container">
        <!-- Loading State -->
        <div class="space-y-4 animate-pulse">
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="tugas.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-medium">Tugas</span>
        </a>
        <a href="modul.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-bold">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="lainnya.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
            <span class="text-[10px] font-medium">Lainnya</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadModules);

        async function loadModules() {
            if (!window.supabaseClient) return;
            const container = document.getElementById('module-container');

            try {
                const { data, error } = await supabaseClient
                    .from('modules')
                    .select('*')
                    .eq('is_visible', true)
                    .order('week', { ascending: true });

                if (error) throw error;

                const user = typeof checkAuth === 'function' ? checkAuth() : null;
                const { data: progress } = user ? await supabaseClient.from('module_progress').select('module_id').eq('student_nim', user.nim).eq('is_completed', true) : { data: [] };
                const completedIds = new Set(progress ? progress.map(p => p.module_id) : []);

                container.innerHTML = '';

                if (data && data.length > 0) {
                    // Find first incomplete to mark as "Active"
                    let firstIncompleteId = data.find(m => !completedIds.has(m.id))?.id;
                    if (!firstIncompleteId && data.length > 0) firstIncompleteId = null; // All done

                    data.forEach((item, index) => {
                        const isCompleted = completedIds.has(item.id);
                        const isActive = item.id === firstIncompleteId;

                        let cardClass = "bg-white border border-slate-100";
                        let titleColor = "text-slate-800";
                        let descColor = "text-slate-500";
                        let badgeClass = "bg-blue-50 text-blue-600 border border-blue-100";
                        let iconColor = "text-slate-300";
                        let bgDeco = "bg-slate-50";
                        let bigIconColor = "text-slate-100";

                        let progressBar = `
                            <div class="flex items-center gap-3 mt-4">
                                <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden">
                                    <div class="bg-slate-300 h-full rounded-full w-[0%]"></div>
                                </div>
                                <span class="text-xs font-bold text-slate-400">0%</span>
                            </div>
                        `;

                        // STYLES
                        if (isCompleted) {
                            // COMPLETED STYLE (Emerald/Clean)
                            cardClass = "bg-emerald-50 border border-emerald-100";
                            titleColor = "text-emerald-900";
                            descColor = "text-emerald-600";
                            badgeClass = "bg-white text-emerald-600 border border-emerald-200";
                            iconColor = "text-emerald-400";
                            bigIconColor = "text-emerald-500/10";
                            progressBar = `
                                <div class="flex items-center gap-3 mt-4">
                                    <div class="flex-1 bg-emerald-200/50 rounded-full h-2 overflow-hidden">
                                        <div class="bg-emerald-500 h-full rounded-full w-full"></div>
                                    </div>
                                    <span class="text-xs font-bold text-emerald-600">100%</span>
                                </div>
                            `;
                        } else if (isActive) {
                            // ACTIVE STYLE (Blue Gradient - Same as Index)
                            cardClass = "bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-lg shadow-blue-500/30 border-none transition-transform hover:scale-[1.02]";
                            titleColor = "text-white";
                            descColor = "text-blue-100";
                            badgeClass = "bg-white/20 text-white border border-white/10 backdrop-blur-sm";
                            iconColor = "text-white/50";
                            bigIconColor = "text-white/10";
                            // Mock progress for active (could be 0 or random/calculated)
                            // We used 65% in mockup, let's just say 0% if new, or maybe keep it simple.
                            // Let's us 0% for now but colored nicely.
                            progressBar = `
                                <div class="flex items-center gap-3 mt-4">
                                    <div class="flex-1 bg-black/20 rounded-full h-2 overflow-hidden backdrop-blur-sm border border-white/5">
                                        <div class="bg-white h-full rounded-full w-[10%]"></div>
                                    </div>
                                    <span class="text-xs font-bold text-white">10%</span>
                                </div>
                            `;
                        }

                        const card = `
                            <a href="detail_modul.html?id=${item.id}" class="block p-6 rounded-[2rem] mb-5 relative overflow-hidden group shadow-sm ${cardClass} relative">
                                <!-- Background Objects for Active -->
                                ${isActive ? `
                                    <div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                                    <div class="absolute bottom-0 left-0 w-24 h-24 bg-blue-400 opacity-20 rounded-full blur-xl -ml-5 -mb-5"></div>
                                ` : ''}

                                <div class="flex items-start justify-between mb-3 relative z-10">
                                    <span class="px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase ${badgeClass}">
                                        Minggu ${item.week}
                                    </span>
                                    ${isCompleted
                                ? `<div class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center"><i class="fa-solid fa-check"></i></div>`
                                : `<i class="fa-solid fa-arrow-right ${isActive ? 'text-white/50' : 'text-slate-300'} group-hover:translate-x-1 transition-transform"></i>`
                            }
                                </div>
                                
                                <h3 class="text-xl font-bold ${titleColor} mb-1 relative z-10 leading-tight">${item.topic}</h3>
                                <p class="text-xs ${descColor} line-clamp-2 relative z-10 font-medium">${item.description || 'Pelajari materi minggu ini.'}</p>
                                
                                <!-- Progress -->
                                <div class="relative z-10">
                                    ${progressBar}
                                </div>

                                <!-- Decorative Icon Bg -->
                                <i class="fa-solid fa-shapes absolute -bottom-4 -right-4 text-8xl ${bigIconColor} z-0 rotate-12 group-hover:rotate-6 transition-transform duration-500"></i>
                            </a>
                        `;
                        container.innerHTML += card;
                    });
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 text-slate-500">
                            <i class="fa-solid fa-box-open text-4xl mb-4 text-slate-300"></i>
                            <p>Belum ada materi tersedia.</p>
                        </div>
                    `;
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-red-500 text-center">Gagal memuat modul.</p>';
            }
        }
    </script>
</body>

</html>
