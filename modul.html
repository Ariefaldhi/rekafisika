<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul & Silabus | KawanFismat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a' }, accent: { 400: '#22d3ee', 500: '#06b6d4' } }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-abstract {
            background-color: #0f172a;
            background-image: radial-gradient(at 50% 0%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .accordion-content {
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            max-height: 0;
            overflow: hidden;
        }

        .accordion-content.active {
            max-height: 1000px;
        }
    </style>
</head>

<body class="bg-abstract text-slate-100 font-inter min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <i class="fa-solid fa-atom text-accent-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide">KawanFismat</span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Beranda</a>
                        <a href="tugas.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Tugas</a>
                        <a href="presensi.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Presensi</a>
                        <a href="keaktifan.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Keaktifan</a>
                        <a href="modul.html"
                            class="text-accent-400 px-3 py-2 rounded-md text-sm font-bold bg-slate-800/50">Modul</a>
                        <a href="profil.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Profil</a>
                    </div>
                </div>
                <div class="-mr-2 flex md:hidden">
                    <button type="button" class="p-2 rounded-md text-slate-400 hover:text-white"
                        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"><i
                            class="fa-solid fa-bars text-xl"></i></button>
                </div>
            </div>
        </div>
        <div class="hidden md:hidden glass-card absolute w-full" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium">Beranda</a>
                <a href="tugas.html" class="block px-3 py-2 rounded-md text-base font-medium">Tugas</a>
                <a href="presensi.html" class="block px-3 py-2 rounded-md text-base font-medium">Presensi</a>
                <a href="keaktifan.html" class="block px-3 py-2 rounded-md text-base font-medium">Keaktifan</a>
                <a href="modul.html" class="text-accent-400 block px-3 py-2 rounded-md text-base font-medium">Modul</a>
                <a href="profil.html" class="block px-3 py-2 rounded-md text-base font-medium">Profil</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full flex-grow">
        <div class="text-center mb-16">
            <h1 class="text-3xl font-bold mb-4">Silabus & Materi</h1>
            <p class="text-slate-400">Rincian modul mingguan dan materi pembelajaran.</p>
        </div>

        <div class="space-y-4" id="accordion-container">
            <!-- Injected by JS -->
            <div class="text-center py-12 text-slate-500 animate-pulse">
                Memuat modul...
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-800 bg-slate-900 text-center mt-auto">
        <p class="text-slate-400 text-sm">&copy; 2026 KawanFismat</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const container = document.getElementById('accordion-container');

        async function loadModules() {
            if (!supabaseClient) {
                setTimeout(loadModules, 500);
                return;
            }

            try {
                // Fetch ONLY visible modules
                const { data, error } = await supabaseClient
                    .from('modules')
                    .select('*')
                    .eq('is_visible', true)
                    .order('week', { ascending: true });

                if (error) throw error;

                container.innerHTML = '';

                if (data && data.length > 0) {
                    data.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'glass-card rounded-lg overflow-hidden border border-slate-700/50';
                        div.innerHTML = `
                            <button class="w-full px-6 py-4 flex items-center justify-between text-left hover:bg-slate-800/50 transition-colors focus:outline-none" onclick="toggleAccordion(${index})">
                                <div class="flex items-center gap-4">
                                    <span class="flex items-center justify-center w-8 h-8 rounded-full bg-accent-500/10 text-accent-400 text-sm font-bold border border-accent-500/20">${item.week}</span>
                                    <h3 class="text-lg font-semibold text-slate-100">${item.topic}</h3>
                                </div>
                                <i class="fa-solid fa-chevron-down text-slate-400 transition-transform duration-300" id="icon-${index}"></i>
                            </button>
                            <div id="content-${index}" class="accordion-content bg-slate-900/30">
                                <div class="px-6 py-5 border-t border-slate-700/50">
                                    <p class="text-slate-300 mb-4">${item.description || ''}</p>
                                    ${item.formula ? `<div class="bg-slate-950/50 rounded-lg p-4 mb-4 border border-slate-800 flex justify-center overflow-x-auto">${item.formula}</div>` : ''}
                                    <div class="flex gap-3">
                                        ${item.link_slide ? `
                                        <a href="${item.link_slide}" target="_blank" class="px-4 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded text-white transition-colors flex items-center">
                                            <i class="fa-solid fa-file-pdf mr-2 text-red-400"></i>Unduh Slide
                                        </a>` : ''}
                                        ${item.link_recording ? `
                                        <a href="${item.link_recording}" target="_blank" class="px-4 py-2 text-sm bg-slate-700 hover:bg-slate-600 rounded text-white transition-colors flex items-center">
                                            <i class="fa-solid fa-play mr-2 text-red-500"></i>Tonton Rekaman
                                        </a>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 text-slate-500">
                            <i class="fa-solid fa-box-open text-4xl mb-4 opacity-50"></i>
                            <p>Belum ada modul yang tersedia saat ini.</p>
                        </div>
                    `;
                }

                // Trigger MathJax after render
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-red-400 text-center">Gagal memuat modul.</p>';
            }
        }

        function toggleAccordion(index) {
            const content = document.getElementById(`content-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const isActive = content.classList.contains('active');

            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.fa-chevron-down').forEach(el => el.style.transform = 'rotate(0deg)');

            if (!isActive) {
                content.classList.add('active');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        document.addEventListener('DOMContentLoaded', loadModules);
    </script>
</body>

</html>
