<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jelajah Materi | FisikaLab</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            500: '#3B82F6', // Blue 500
                            600: '#2563EB', // Blue 600
                        },
                        ui: {
                            bg: '#F8FAFC', // Slate 50
                            card: '#FFFFFF',
                            text: '#1E293B', // Slate 800
                            sub: '#64748B', // Slate 500
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Jelajah Materi</h1>
        <p class="text-sm text-slate-500 mt-1">Modul pembelajaran Fisika Matematika I</p>
    </div>

    <!-- Content -->
    <main class="px-6 py-6" id="module-container">
        <!-- Loading State -->
        <div class="space-y-4 animate-pulse">
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="tugas.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-medium">Tugas</span>
        </a>
        <a href="modul.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-bold">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="lainnya.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
            <span class="text-[10px] font-medium">Lainnya</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadModules);

        async function loadModules() {
            if (!window.supabaseClient) return;
            const container = document.getElementById('module-container');

            try {
                const { data, error } = await supabaseClient
                    .from('modules')
                    .select('*')
                    .eq('is_visible', true)
                    .order('week', { ascending: true });

                if (error) throw error;

                // Check Progress (Mock or Real)
                // For simplicity in this redesign step, we render the cards first.
                // Real progress logic can be re-integrated from previous file if needed.

                container.innerHTML = '';

                if (data && data.length > 0) {
                    data.forEach((item, index) => {
                        const card = `
                            <a href="detail_modul.html?id=${item.id}" class="block bg-white p-5 rounded-3xl shadow-soft mb-4 hover:shadow-lg transition-all hover:-translate-y-1 group relative overflow-hidden border border-slate-100">
                                <div class="flex items-start justify-between mb-2 relative z-10">
                                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold">Minggu ${item.week}</span>
                                    <i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-primary-500 transition-colors"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800 mb-1 relative z-10">${item.topic}</h3>
                                <p class="text-sm text-slate-500 line-clamp-2 relative z-10">${item.description || 'Pelajari materi minggu ini.'}</p>
                                
                                <!-- Decorative Icon Bg -->
                                <i class="fa-solid fa-book absolute -bottom-2 -right-2 text-6xl text-slate-50 opacity-50 z-0"></i>
                            </a>
                        `;
                        container.innerHTML += card;
                    });
                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 text-slate-500">
                            <i class="fa-solid fa-box-open text-4xl mb-4 text-slate-300"></i>
                            <p>Belum ada materi tersedia.</p>
                        </div>
                    `;
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-red-500 text-center">Gagal memuat modul.</p>';
            }
        }
    </script>
</body>

</html>
