<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | KawanFismat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<script src="config.js?v=2.4"></script></head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center space-y-6">
        <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mx-auto animate-pulse">
            <i class="fa-solid fa-person-digging text-4xl text-blue-600"></i>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-black text-slate-900">Sedang Perbaikan</h1>
            <p class="text-slate-500">Sistem sedang menjalani perawatan berkala untuk meningkatkan performa. Kami akan
                segera kembali.</p>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-left flex items-center gap-4">
            <div class="w-10 h-10 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-clock text-amber-500"></i>
            </div>
            <div>
                <h3 class="font-bold text-slate-800 text-sm">Estimasi Waktu</h3>
                <p class="text-xs text-slate-400">Hubungi dosen jika mendesak.</p>
            </div>
        </div>

        <button onclick="checkStatus()"
            class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors">
            Coba Refresh
        </button>

        <!-- Admin Bypass Login (Hidden/Subtle) -->
        <a href="login.html" class="block text-xs text-slate-300 hover:text-blue-500 mt-8">Admin Login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        async function checkStatus() {
            if (!window.supabaseClient) { window.location.reload(); return; }

            try {
                const { data } = await supabaseClient
                    .from('announcements')
                    .select('content')
                    .eq('type', 'system_maintenance')
                    .single();

                // If maintenance is OFF (false), go home
                if (!data || data.content !== 'true') {
                    window.location.href = 'index.html';
                } else {
                    VisualModal.alert('Sistem masih dalam perbaikan. Silakan coba beberapa saat lagi.', 'Maintenance', 'info');
                }
            } catch (e) {
                window.location.reload();
            }
        }
    </script>
</body>

</html>
