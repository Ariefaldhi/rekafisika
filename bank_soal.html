<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Soal | FisikaLab</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js?v=2.5"></script>
    <script src="modal.js"></script>
    <script src="sound-effects.js"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm border-b border-slate-100">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Bank Soal</h1>
        <p class="text-sm text-slate-500 mt-1">Kumpulan arsip soal latihan dan ujian.</p>
    </div>

    <!-- Content -->
    <main class="px-4 py-6 max-w-7xl mx-auto">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="file-grid">
            <!-- Items injected via JS -->
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="profil.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Profil</span>
        </a>
    </nav>

    <script>
        const files = [
            "Soal Latihan Diferensial Parsial & Integral Lipat - 2023.pdf",
            "Soal Latihan Kakulus Variasi - 2023.pdf",
            "Soal Latihan Matriks dan Determinan - 2023.pdf",
            "Soal Latihan PDB - 2023.pdf",
            "Soal Latihan deret Tak Hingga dan Deret Fourier 2022.doc",
            "Soal Latihan deret Tak Hingga dan Deret Fourier 2023.pdf",
            "TES UNIT 4 FISMAT 1 Ganjil 2021-2022.doc",
            "TU 1_FISIKA MATEMATIKA 1 2022_22ABC.pdf",
            "TU 1_Fismat 1 2023_23ABCD.pdf",
            "TU 2 FISMAT 1 2022 (PDB DAN KALKULUS VARIASI).pdf",
            "Tes Unit 1 MatDas 2025.pdf"
        ];

        const grid = document.getElementById('file-grid');

        files.forEach(file => {
            const isPDF = file.toLowerCase().endsWith('.pdf');
            const cleanName = file.replace('.pdf', '').replace('.doc', '').replace(/_/g, ' ');

            const card = document.createElement('div');
            card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col hover:border-blue-200 transition-all group";

            const icon = isPDF
                ? '<div class="w-10 h-10 rounded-lg bg-red-50 text-red-500 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform"><i class="fa-solid fa-file-pdf"></i></div>'
                : '<div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center text-xl mb-4 group-hover:scale-110 transition-transform"><i class="fa-solid fa-file-word"></i></div>';

            const action = isPDF
                ? `<a href="viewer.html?file=${encodeURIComponent('Bank Soal Fismat/' + file)}" class="mt-4 w-full block text-center py-2.5 bg-slate-50 hover:bg-slate-100 text-slate-700 font-bold text-xs rounded-xl transition-colors">Buka Dokumen</a>`
                : `<button disabled class="mt-4 w-full block text-center py-2.5 bg-slate-50 text-slate-400 font-bold text-xs rounded-xl cursor-not-allowed">Preview Unavailable</button>`;

            card.innerHTML = `
                ${icon}
                <h3 class="font-bold text-slate-700 text-sm leading-snug line-clamp-2" title="${cleanName}">${cleanName}</h3>
                <p class="text-[10px] text-slate-400 mt-1 font-mono uppercase">${isPDF ? 'PDF File' : 'Word Doc'}</p>
                <div class="mt-auto pt-2">
                    ${action}
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>

</html>
