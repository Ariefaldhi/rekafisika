<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presensi | FisikaLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Sticky Column Styles */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 20;
            background-color: white;
            /* Match card bg */
        }

        th:first-child {
            z-index: 30;
        }

        /* Header gets higher priority */

        /* Custom scrollbar for table */
        .table-container::-webkit-scrollbar {
            height: 6px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
<script src="config.js?v=2.5"></script></head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Presensi</h1>
        <p class="text-sm text-slate-500 mt-1">Transparansi kehadiran mahasiswa.</p>
    </div>

    <!-- Content -->
    <main class="px-6 py-6">

        <!-- Legend -->
        <div class="flex gap-3 mb-6 overflow-x-auto pb-2 scrollbar-hide">
            <span
                class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-lg text-xs font-bold border border-emerald-100 whitespace-nowrap">
                <i class="fa-solid fa-circle text-[8px]"></i> Hadir
            </span>
            <span
                class="flex items-center gap-1.5 px-3 py-1.5 bg-yellow-50 text-yellow-600 rounded-lg text-xs font-bold border border-yellow-100 whitespace-nowrap">
                <i class="fa-solid fa-circle text-[8px]"></i> Izin/Sakit
            </span>
            <span
                class="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-600 rounded-lg text-xs font-bold border border-red-100 whitespace-nowrap">
                <i class="fa-solid fa-circle text-[8px]"></i> Alfa
            </span>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden relative">
            <div class="table-container max-h-[70vh]">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 sticky top-0 z-20">
                        <tr id="table-header">
                            <th class="px-4 py-3 font-bold border-b border-slate-200">Mahasiswa</th>
                            <!-- Columns injected via JS -->
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="10" class="p-8 text-center text-slate-400">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-primary-500"></i><br>
                                Memuat Data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-xs text-slate-400 mt-6">Geser tabel untuk melihat riwayat mingguan.</p>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="profil.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Profil</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="this.onerror=null;this.src='https://unpkg.com/@supabase/supabase-js@2'"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', loadAttendance);

        async function loadAttendance() {
            if (!window.supabaseClient) return;

            const headerRow = document.getElementById('table-header');
            const weeks = 16;
            const sessions = 1; // Simplify mobile view: 1 session per week column for width save? or stick to 2

            // Let's stick to week-session logic but make headers smaller
            for (let w = 1; w <= weeks; w++) {
                const th = document.createElement('th');
                th.className = "px-3 py-3 border-b border-slate-200 text-center min-w-[60px] font-bold text-slate-400";
                th.innerText = `M${w}`;
                headerRow.appendChild(th);
            }

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            try {
                // Fetch Data
                const { data: students } = await supabaseClient.from('students').select('*').order('name');
                const { data: logs } = await supabaseClient.from('attendance_logs').select('*');

                if (!students || students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="20" class="text-center py-4 text-slate-500">Data kosong.</td></tr>';
                    return;
                }

                students.forEach(student => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors group";

                    // Fixed Name Column
                    const tdName = document.createElement('td');
                    tdName.className = "px-4 py-3 font-semibold text-slate-700 border-r border-slate-100 group-hover:bg-slate-50 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]";
                    tdName.innerHTML = `<span class="line-clamp-1 w-32 md:w-auto text-xs md:text-sm">${student.name}</span>`;
                    tr.appendChild(tdName);

                    // Columns
                    for (let w = 1; w <= weeks; w++) {
                        const td = document.createElement('td');
                        td.className = "px-3 py-3 text-center border-b border-slate-100";

                        // Check for ANY log in that week (Simplifying: M1-1 or M1-2 count as attended for that week bubble)
                        // Or we can just check M{w}-1 for simplicity in this view
                        const code = `${w}-1`;
                        const log = logs.find(l => l.student_nim === student.nim && l.meeting_code === code);

                        if (log) {
                            let iconClass = "text-slate-300";
                            if (log.status === 'Hadir') iconClass = "text-emerald-500";
                            else if (log.status === 'Sakit' || log.status === 'Izin') iconClass = "text-yellow-500";
                            else if (log.status === 'Alfa') iconClass = "text-red-500";

                            td.innerHTML = `<i class="fa-solid fa-circle text-[10px] ${iconClass}"></i>`;
                        } else {
                            td.innerHTML = `<span class="text-slate-200 text-[10px]">•</span>`;
                        }
                        tr.appendChild(td);
                    }
                    tbody.appendChild(tr);
                });

            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
