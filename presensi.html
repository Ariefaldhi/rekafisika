        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            font-size: 0.8rem;
        }

        th,
        td {

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            text-align: center;
        }

        th {

            position: sticky;
            top: 0;
            z-index: 10;

        td:first-child {

    </style>

    <!-- Content -->

        <a href="tugas.html"

            <span class="text-[10px] font-medium">Tugas</span>

        <a href="profil.html"

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        async function loadAttendance() {
            if (!supabaseClient) return;

            // Generate Headers (1-1 to 16-2)
            const headerRow = document.getElementById('table-header');
            const weeks = 16;
            const sessions = 2;
            const columns = [];

            for (let w = 1; w <= weeks; w++) {
                for (let s = 1; s <= sessions; s++) {
                    const code = `${w}-${s}`;
                    columns.push(code);
                    const th = document.createElement('th');
                    th.innerText = code;
                    headerRow.appendChild(th);
                }
            }

            // Fetch Students & Logs
            const { data: students } = await supabaseClient.from('students').select('*').order('name');
            const { data: logs } = await supabaseClient.from('attendance_logs').select('*');

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if (!students || students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="33" class="text-center py-4">Belum ada data mahasiswa.</td></tr>';
                return;
            }

            students.forEach(student => {
                const tr = document.createElement('tr');

                // Name Cell
                const tdName = document.createElement('td');
                tdName.className = 'font-medium text-slate-200';
                tdName.innerText = student.name;
                tr.appendChild(tdName);

                // Attendance Cells
                columns.forEach(code => {
                    const td = document.createElement('td');
                    // Find log for this student & code
                    const log = logs.find(l => l.student_nim === student.nim && l.meeting_code === code);

                    if (log) {
                        const icon = document.createElement('i');
                        icon.className = 'fa-solid';

                        if (log.status === 'Hadir') {
                            icon.classList.add('fa-check', 'status-hadir');
                        } else if (log.status === 'Sakit') {
                            icon.classList.add('fa-briefcase-medical', 'status-sakit');
                            td.title = 'Sakit';
                        } else if (log.status === 'Izin') {
                            icon.classList.add('fa-envelope-open-text', 'status-izin');
                            td.title = 'Izin';
                        } else if (log.status === 'Alfa') {
                            icon.classList.add('fa-xmark', 'status-alfa');
                            td.title = 'Alfa';
                        }
                        td.appendChild(icon);
                    } else {
                        td.innerHTML = '<span class="text-slate-700">-</span>';
                    }
                    tr.appendChild(td);
                });

                tbody.appendChild(tr);
            });
        }

        document.addEventListener('DOMContentLoaded', loadAttendance);
    </script>
</body>
