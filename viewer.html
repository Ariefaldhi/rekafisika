<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viewer | KawanFismat</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDF.js & MathJax (Keep existing libs) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #pdf-render {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body class="bg-slate-100 font-inter text-ui-text min-h-screen">

    <!-- Header (Condensed) -->
    <div class="px-4 py-3 bg-white sticky top-0 z-40 shadow-sm flex justify-between items-center" id="main-header">
        <div class="flex items-center gap-3">
            <a href="bank_soal.html"
                class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-500 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="font-bold text-slate-900 truncate max-w-[200px]" id="doc-title">Document Viewer</h1>
        </div>

        <div class="flex gap-2">
            <button id="explain-btn"
                class="hidden md:flex items-center gap-2 px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Explain
            </button>
            <button onclick="zoomOut()"
                class="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-600 rounded-lg border border-slate-200"><i
                    class="fa-solid fa-minus"></i></button>
            <button onclick="zoomIn()"
                class="w-8 h-8 flex items-center justify-center bg-slate-50 text-slate-600 rounded-lg border border-slate-200"><i
                    class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- Main View -->
    <div class="p-4 md:p-8 flex justify-center">
        <div class="w-full max-w-4xl bg-white shadow-xl rounded-lg overflow-hidden relative min-h-[500px]"
            id="viewer-container">
            <canvas id="pdf-render" class="w-full"></canvas>

            <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-20">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-primary-500 mb-2"></i>
                <p class="text-xs font-bold text-slate-400">LOADING...</p>
            </div>

            <!-- AI Overlay -->
            <div id="ai-panel"
                class="hidden absolute top-0 right-0 w-full md:w-80 h-full bg-white border-l border-slate-200 shadow-2xl z-30 overflow-y-auto p-4 transition-transform">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-indigo-700">AI Analysis</h3>
                    <button onclick="toggleAI(false)" class="text-slate-400 hover:text-red-500"><i
                            class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="ai-content" class="text-sm prose text-slate-600"></div>
            </div>
        </div>
    </div>

    <!-- Floating Nav Controls -->
    <div
        class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900/90 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-6">
        <button id="prev-btn" class="hover:text-primary-400"><i class="fa-solid fa-chevron-left"></i></button>
        <span class="font-mono text-sm font-bold"><span id="curr-page">1</span> / <span id="total-page">--</span></span>
        <button id="next-btn" class="hover:text-primary-400"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- Mobile AI Fab -->
    <button onclick="toggleAI(true)"
        class="md:hidden fixed bottom-24 right-6 w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg shadow-indigo-600/30 flex items-center justify-center z-40">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
    </button>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const url = urlParams.get('file');
        const startPage = parseInt(urlParams.get('start')) || 1;
        const isEmbed = urlParams.get('embed') === 'true';

        if (isEmbed) {
            document.getElementById('main-header').classList.add('hidden');
            document.body.classList.remove('bg-ui-bg');
            document.body.classList.add('bg-transparent');
            document.querySelector('.fixed.bottom-6').classList.add('scale-75', 'origin-bottom'); // Smaller controls
        }

        if (url) {
            const name = url.split('/').pop().replace('.pdf', '').replace(/_/g, ' ');
            document.getElementById('doc-title').innerText = name;
            document.title = name;
        }

        let pdfDoc = null, pageNum = startPage, pageRendering = false, scale = 1.0;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');

        pdfjsLib.getDocument(url || 'buku.pdf').promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('total-page').textContent = pdf.numPages;
            renderPage(pageNum);
        });

        function renderPage(num) {
            pageRendering = true;
            document.getElementById('loading-spinner').classList.remove('hidden');
            pdfDoc.getPage(num).then(page => {
                const containerWidth = document.getElementById('viewer-container').clientWidth;
                const viewportRaw = page.getViewport({ scale: 1 });
                const finalScale = (containerWidth / viewportRaw.width) * scale;

                const viewport = page.getViewport({ scale: finalScale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    pageRendering = false;
                    document.getElementById('loading-spinner').classList.add('hidden');
                });
            });
            document.getElementById('curr-page').textContent = num;
        }

        document.getElementById('prev-btn').addEventListener('click', () => { if (pageNum > 1) { pageNum--; renderPage(pageNum); } });
        document.getElementById('next-btn').addEventListener('click', () => { if (pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); } });

        window.zoomIn = () => { scale += 0.2; renderPage(pageNum); };
        window.zoomOut = () => { if (scale > 0.4) { scale -= 0.2; renderPage(pageNum); } };

        window.toggleAI = async (show) => {
            const panel = document.getElementById('ai-panel');
            if (show) {
                panel.classList.remove('hidden');
                // Auto trigger logic roughly similar to buku.html...
                const content = document.getElementById('ai-content');
                content.innerHTML = '<p class="text-center py-4"><i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing...</p>';

                // ... (Assuming similar logic to before, simplified for this snippet)
                try {
                    if (typeof GROQ_API_KEY === 'undefined' || !GROQ_API_KEY) throw new Error("API Key Missing");
                    const page = await pdfDoc.getPage(pageNum);
                    const txt = await page.getTextContent();
                    const raw = txt.items.map(s => s.str).join(' ');

                    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: "user", content: "Jelaskan ini singkat: " + raw.substring(0, 2000) }],
                            model: "llama-3.3-70b-versatile"
                        })
                    });
                    const data = await response.json();
                    content.innerHTML = marked.parse(data.choices[0].message.content);
                } catch (e) {
                    content.innerHTML = "Error: " + e.message;
                }

            } else {
                panel.classList.add('hidden');
            }
        };
    </script>
</body>

</html>
