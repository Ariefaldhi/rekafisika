<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Referensi | FisikaLab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDF.js & MathJax (Keep existing libs) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #pdf-render {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Referensi</h1>
            <p class="text-sm text-slate-500 mt-1">Buku Pegangan Kuliah</p>
        </div>
        <a href="buku.pdf" download
            class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
            <i class="fa-solid fa-download"></i>
        </a>
    </div>

    <!-- Content -->
    <main class="px-4 py-6">

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <!-- Controls -->
            <div class="bg-slate-50 border-b border-slate-100 p-4 flex flex-wrap items-center justify-between gap-4">
                <!-- Page Nav -->
                <div class="flex items-center gap-3 bg-white px-3 py-1.5 rounded-xl border border-slate-200 shadow-sm">
                    <button id="prev-page" class="text-slate-400 hover:text-primary-600 disabled:opacity-30"><i
                            class="fa-solid fa-chevron-left"></i></button>
                    <span class="text-xs font-bold text-slate-700 min-w-[60px] text-center"><span
                            id="page-num">--</span> / <span id="page-count">--</span></span>
                    <button id="next-page" class="text-slate-400 hover:text-primary-600 disabled:opacity-30"><i
                            class="fa-solid fa-chevron-right"></i></button>
                </div>

                <div class="flex items-center gap-2">
                    <button id="explain-btn"
                        class="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/20 transition-all">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>Jelaskan</span>
                    </button>
                    <div class="flex items-center bg-white px-2 py-1.5 rounded-xl border border-slate-200 shadow-sm">
                        <button id="zoom-out"
                            class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-slate-700"><i
                                class="fa-solid fa-minus text-xs"></i></button>
                        <button id="zoom-in"
                            class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-slate-700"><i
                                class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                </div>
            </div>

            <!-- Canvas Container -->
            <div class="relative bg-slate-100 min-h-[400px] flex justify-center p-4 overflow-auto"
                id="canvas-container">
                <canvas id="pdf-render" class="shadow-xl rounded-lg bg-white"></canvas>

                <!-- Spinner -->
                <div id="loading-spinner"
                    class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 z-20">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-primary-500 mb-2"></i>
                    <p class="text-xs font-bold text-slate-400">MEMUAT HALAMAN...</p>
                </div>

                <!-- Error -->
                <div id="error-message"
                    class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white z-30 p-8 text-center">
                    <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-4">
                        <i class="fa-solid fa-book-dead text-2xl text-red-500"></i>
                    </div>
                    <h3 class="font-bold text-slate-900 mb-2">Buku Tidak Ditemukan</h3>
                    <p class="text-slate-500 text-sm mb-4">File <code>buku.pdf</code> belum diupload.</p>
                </div>
            </div>

            <!-- AI Section -->
            <div id="ai-section" class="hidden border-t border-slate-100 p-6 bg-indigo-50/50">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center"><i
                            class="fa-solid fa-robot"></i></div>
                    <h3 class="font-bold text-indigo-900">Analisis AI</h3>
                </div>

                <div id="ai-loading" class="hidden py-8 text-center">
                    <i class="fa-solid fa-circle-notch fa-spin text-indigo-500 mb-2"></i>
                    <p class="text-xs text-indigo-400">Sedang membaca halaman...</p>
                </div>

                <div id="ai-result" class="prose prose-sm max-w-none text-slate-700"></div>
                <div id="ai-placeholder"
                    class="hidden p-4 bg-red-50 text-red-600 rounded-xl text-sm border border-red-100"></div>
            </div>

        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="profil.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-medium">Profil</span>
        </a>
    </nav>

    <!-- Config & Script -->
    <script src="config.js?v=2.2"></script>
    <script>
        // Keep original Logic, just adjusted UI references
        const url = 'buku.pdf';
        let pdfDoc = null, pageNum = 1, pageRendering = false, pageNumPending = null, scale = 1.0;
        const canvas = document.getElementById('pdf-render');
        const ctx = canvas.getContext('2d');
        const loadingSpinner = document.getElementById('loading-spinner');

        function renderPage(num) {
            pageRendering = true;
            loadingSpinner.classList.remove('hidden');

            pdfDoc.getPage(num).then(function (page) {
                const containerWidth = document.getElementById('canvas-container').clientWidth - 32;
                const viewportRaw = page.getViewport({ scale: 1 });
                const renderScale = (containerWidth / viewportRaw.width) * scale;

                const viewport = page.getViewport({ scale: renderScale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = { canvasContext: ctx, viewport: viewport };
                page.render(renderContext).promise.then(() => {
                    pageRendering = false;
                    loadingSpinner.classList.add('hidden');
                    if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
                });
            }).catch(e => {
                loadingSpinner.classList.add('hidden');
            });

            document.getElementById('page-num').textContent = num;
            document.getElementById('prev-page').disabled = num <= 1;
            document.getElementById('next-page').disabled = num >= pdfDoc.numPages;
        }

        function queueRenderPage(num) {
            if (pageRendering) pageNumPending = num;
            else renderPage(num);
        }

        document.getElementById('prev-page').addEventListener('click', () => { if (pageNum > 1) { pageNum--; queueRenderPage(pageNum); } });
        document.getElementById('next-page').addEventListener('click', () => { if (pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); } });

        document.getElementById('zoom-in').addEventListener('click', () => { scale += 0.2; queueRenderPage(pageNum); });
        document.getElementById('zoom-out').addEventListener('click', () => { if (scale > 0.4) { scale -= 0.2; queueRenderPage(pageNum); } });

        pdfjsLib.getDocument(url).promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('page-count').textContent = pdf.numPages;
            renderPage(pageNum);
        }).catch(err => {
            loadingSpinner.classList.add('hidden');
            document.getElementById('error-message').classList.remove('hidden');
        });

        // AI Logic
        const explainBtn = document.getElementById('explain-btn');
        const aiSection = document.getElementById('ai-section');
        const aiResult = document.getElementById('ai-result');
        const aiLoading = document.getElementById('ai-loading');

        explainBtn.addEventListener('click', async () => {
            aiSection.classList.remove('hidden');
            aiSection.scrollIntoView({ behavior: 'smooth' });
            aiResult.innerHTML = '';
            aiLoading.classList.remove('hidden');

            try {
                // Check key
                if (typeof GROQ_API_KEY === 'undefined' || !GROQ_API_KEY || GROQ_API_KEY.includes("PASTE_")) throw new Error("API Key belum diset di config.js");

                // Get text
                const page = await pdfDoc.getPage(pageNum);
                const textContent = await page.getTextContent();
                const rawText = textContent.items.map(s => s.str).join(' ');

                if (!rawText.trim()) throw new Error("Halaman ini kosong/gambar saja.");

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Jelaskan materi Fisika berikut dengan bahasa Indonesia yang mudah. Jika ada rumus, jelaskan makna simbolnya." },
                            { role: "user", content: rawText.substring(0, 8000) }
                        ],
                        model: "llama-3.3-70b-versatile"
                    })
                });

                if (!response.ok) throw new Error("Gagal menghubungi AI");
                const data = await response.json();

                aiResult.innerHTML = marked.parse(data.choices[0].message.content);
                if (window.MathJax) MathJax.typesetPromise([aiResult]);

            } catch (e) {
                aiResult.innerHTML = `<span class="text-red-500 font-bold">Error:</span> ${e.message}`;
            } finally {
                aiLoading.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
