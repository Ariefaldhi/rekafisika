<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <script src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modul | RekaFisika</title>
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            500: '#3B82F6', // Blue 500
                            600: '#2563EB', // Blue 600
                        },
                        ui: {
                            bg: '#F8FAFC', // Slate 50
                            card: '#FFFFFF',
                            text: '#1E293B', // Slate 800
                            sub: '#64748B', // Slate 500
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-enter {
            animation: slide-up 0.5s ease-out forwards;
            opacity: 0;
        }

        .delay-100 {
            animation-delay: 100ms;
        }
    </style>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>
    <script src="config.js?v=2.5"></script>
    <script src="modal.js"></script>
    <script src="sound-effects.js"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <div class="max-w-7xl mx-auto relative min-h-screen flex flex-col">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm animate-enter">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Jelajah Materi</h1>
        <p class="text-sm text-slate-500 mt-1">Modul pembelajaran Fisika</p>
    </div>

    <!-- Content -->
    <main class="px-6 py-6 animate-enter delay-100" id="module-container">
        <!-- Loading State -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-pulse">
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
            <div class="bg-white p-5 rounded-3xl h-32"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 w-full px-6 pb-6 pt-10 pointer-events-none z-50">
        <nav
            class="max-w-md mx-auto bg-white/90 backdrop-blur-xl border border-slate-200 py-3 px-8 flex justify-between items-center shadow-2xl rounded-3xl pointer-events-auto">
            <a href="index.html"
                class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
                <i class="fa-solid fa-house text-xl"></i>
                <span class="text-[10px] font-medium">Beranda</span>
            </a>
            <a href="modul.html" class="flex flex-col items-center gap-1 text-primary-500">
                <i class="fa-solid fa-compass text-xl"></i>
                <span class="text-[10px] font-bold">Jelajah</span>
            </a>
            <a href="lainnya.html"
                class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
                <i class="fa-solid fa-bars text-xl"></i>
                <span class="text-[10px] font-medium">Lainnya</span>
            </a>
        </nav>
    </div>
</div>

    <!-- Scripts -->

    <script>
        document.addEventListener('DOMContentLoaded', loadModules);

        async function loadModules() {
            const container = document.getElementById('module-container');

            // Wait for Supabase (Polling logic handled in config.js)
            if (!await window.ensureSupabase()) {
                if (container) {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <i class="fa-solid fa-cloud-bolt text-4xl mb-4 text-slate-300"></i>
                            <p class="text-slate-500">Gagal terhubung ke database.</p>
                            <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-primary-500 text-white rounded-lg text-sm font-bold">Refresh</button>
                        </div>
                    `;
                }
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('modules')
                    .select('*')
                    .eq('is_visible', true)
                    .order('week', { ascending: true })
                    .order('created_at', { ascending: true });

                if (error) throw error;

                const user = typeof checkAuth === 'function' ? checkAuth() : null;

                // Fetch Progress
                const { data: progressList } = user ? await supabaseClient
                    .from('module_progress')
                    .select('*')
                    .eq('student_nim', user.nim)
                    : { data: [] };

                const progressMap = {};
                if (progressList) {
                    progressList.forEach(p => {
                        progressMap[p.module_id] = p;
                    });
                }

                container.innerHTML = '';

                if (data && data.length > 0) {
                    let html = '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">';

                    data.forEach(item => {
                        const prog = progressMap[item.id] || { is_completed: false, completed_steps: [] };
                        const isCompleted = prog.is_completed;
                        const isLocked = item.is_locked;

                        let percent = 0;
                        if (isCompleted) percent = 100;
                        else {
                            const totalSteps = item.steps ? item.steps.length : 0;
                            const doneSteps = prog.completed_steps ? prog.completed_steps.length : 0;
                            if (totalSteps > 0) percent = Math.round((doneSteps / totalSteps) * 100);
                        }

                        let cardClass = isCompleted ? "bg-emerald-50/50 border-emerald-100" : "bg-white border-slate-100";
                        let iconClass = isCompleted ? "text-emerald-500" : "text-primary-500";
                        let textClass = isCompleted ? "text-slate-800" : "text-slate-800";

                        let clickAction = "";
                        let href = `detail_modul.html?id=${item.id}`;
                        let iconHtml = isCompleted ? `<i class="fa-solid fa-check ${iconClass}"></i>` : `<i class="fa-solid fa-book-open ${iconClass}"></i>`;

                        if (isLocked) {
                            cardClass = "bg-slate-50 border-slate-200 opacity-80 cursor-not-allowed";
                            iconClass = "text-slate-400";
                            textClass = "text-slate-500";
                            href = "javascript:void(0)";
                            clickAction = `onclick="VisualModal.alert('Modul ini belum dibuka oleh Admin.', 'Terkunci', 'lock'); return false;"`;
                            iconHtml = `<i class="fa-solid fa-lock text-slate-400"></i>`;
                        }

                        html += `
                            <a href="${href}" ${clickAction} class="group block p-5 rounded-2xl border ${cardClass} shadow-sm hover:shadow-md transition-all relative overflow-hidden">
                                <div class="flex items-start gap-4 relative z-10">
                                    <div class="w-10 h-10 rounded-full ${isLocked ? 'bg-slate-200' : (isCompleted ? 'bg-emerald-100' : 'bg-primary-50')} flex items-center justify-center shrink-0">
                                        ${iconHtml}
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex items-center justify-between">
                                            <h3 class="font-bold ${textClass} text-lg leading-tight mb-1 group-hover:text-primary-600 transition-colors">${item.topic}</h3>
                                            ${isLocked ? '<span class="text-[10px] font-bold uppercase bg-slate-200 text-slate-500 px-2 py-0.5 rounded">LOCKED</span>' : ''}
                                        </div>
                                        <p class="text-xs text-slate-500 line-clamp-2">${item.description || 'Pelajari materi ini.'}</p>
                                        
                                        ${!isLocked ? `
                                        <div class="mt-3 flex items-center gap-3">
                                             <div class="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                                <div class="h-full rounded-full transition-all duration-500 ${isCompleted ? 'bg-emerald-500' : 'bg-primary-500'}" style="width: ${percent}%"></div>
                                            </div>
                                            <span class="text-[10px] font-bold text-slate-400">${percent}%</span>
                                        </div>` : '<div class="mt-3 h-1.5 w-full bg-slate-200 rounded-full"></div>'}
                                    </div>
                                    ${!isLocked ? `<i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-primary-500 transition-colors self-center"></i>` : ''}
                                </div>
                            </a>
                        `;
                    });

                    html += '</div>';
                    container.innerHTML = html;

                } else {
                    container.innerHTML = `
                        <div class="text-center py-12 text-slate-500">
                            <i class="fa-solid fa-box-open text-4xl mb-4 text-slate-300"></i>
                            <p>Belum ada materi tersedia.</p>
                        </div>
                    `;
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p class="text-red-500 text-center">Gagal memuat modul.</p>';
            }
        }
    </script>
</body>

</html>
