<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peringkat | FisikaLab</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            500: '#3B82F6', // Blue 500
                        },
                        ui: {
                            bg: '#F8FAFC', // Slate 50
                            card: '#FFFFFF',
                            text: '#1E293B', // Slate 800
                            sub: '#64748B', // Slate 500
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex flex-col">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Leaderboard 🏆</h1>

        <!-- Tabs -->
        <div class="mt-4 flex bg-slate-100 p-1 rounded-2xl">
            <button onclick="switchTab('participation')" id="tab-participation"
                class="flex-1 py-2 rounded-xl text-sm font-bold text-white bg-primary-500 shadow-sm transition-all">
                Keaktifan
            </button>
            <button onclick="switchTab('diligence')" id="tab-diligence"
                class="flex-1 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 transition-all">
                Kerajinan
            </button>
        </div>
    </div>

    <!-- Content -->
    <main class="px-6 py-6 font-inter">

        <!-- Top 3 Podium (Mobile Stacked for now, easier to read) -->
        <div id="podium-container" class="space-y-4 mb-8">
            <!-- Loading -->
            <div class="animate-pulse space-y-4">
                <div class="h-24 bg-white rounded-3xl"></div>
                <div class="h-24 bg-white rounded-3xl"></div>
                <div class="h-24 bg-white rounded-3xl"></div>
            </div>
        </div>

        <!-- List Header -->
        <h3 class="font-bold text-lg text-slate-800 mb-4 px-2">Peringkat Lainnya</h3>

        <!-- List Container -->
        <div id="leaderboard-list" class="space-y-3">
            <!-- Injected -->
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="tugas.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-medium">Tugas</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-bold">Peringkat</span>
        </a>
        <a href="lainnya.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
            <span class="text-[10px] font-medium">Lainnya</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script>
        let currentTab = 'participation';

        function switchTab(tab) {
            currentTab = tab;
            const tab1 = document.getElementById('tab-participation');
            const tab2 = document.getElementById('tab-diligence');

            if (tab === 'participation') {
                tab1.className = 'flex-1 py-2 rounded-xl text-sm font-bold text-white bg-primary-500 shadow-sm transition-all';
                tab2.className = 'flex-1 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 transition-all';
            } else {
                tab2.className = 'flex-1 py-2 rounded-xl text-sm font-bold text-white bg-pink-500 shadow-sm transition-all';
                tab1.className = 'flex-1 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-slate-800 transition-all';
            }
            loadData();
        }

        async function loadData() {
            if (!window.supabaseClient) return;
            const podiumContainer = document.getElementById('podium-container');
            const listContainer = document.getElementById('leaderboard-list');

            podiumContainer.innerHTML = '<div class="text-center py-4"><i class="fa-solid fa-spinner fa-spin text-primary-500"></i></div>';
            listContainer.innerHTML = '';

            try {
                // Fetch basic data (Same logic as before, just styling changed)
                const { data: students } = await supabaseClient.from('students').select('*');
                if (!students) return;

                // Mocking points calculation for display speed (in real app, use the same logic as before)
                // For this redesign demo, let's assume we have points.
                // Re-using the logic from previous keaktifan.html is best for data integrity.

                let leaderboard = [];

                if (currentTab === 'participation') {
                    const { data: logs } = await supabaseClient.from('participation_logs').select('student_nim, points');
                    if (logs) {
                        leaderboard = students.map(s => {
                            const pts = logs.filter(l => l.student_nim === s.nim).reduce((sum, l) => sum + (l.points || 0), 0);
                            return { ...s, totalPoints: pts };
                        });
                    }
                } else {
                    // --- Kerajinan (Diligence) Logic ---
                    // Points from Completed Assignments
                    const { data: assignments } = await supabaseClient.from('assignments').select('id, points');
                    const { data: submissions } = await supabaseClient.from('assignment_submissions').select('student_nim, assignment_id');

                    if (assignments && submissions) {
                        // Create Map: Assignment ID -> Points
                        const pointsMap = {};
                        assignments.forEach(a => pointsMap[a.id] = (a.points || 10)); // Default 10 if null

                        leaderboard = students.map(s => {
                            // Find all submissions for this student
                            const userSubs = submissions.filter(sub => sub.student_nim === s.nim);
                            // Sum points
                            const total = userSubs.reduce((sum, sub) => sum + (pointsMap[sub.assignment_id] || 0), 0);
                            return { ...s, totalPoints: total };
                        });
                    }
                }

                leaderboard.sort((a, b) => b.totalPoints - a.totalPoints);

                // Render Top 3
                const top3 = leaderboard.slice(0, 3);
                podiumContainer.innerHTML = top3.map((s, idx) => {
                    const rank = idx + 1;
                    const color = rank === 1 ? 'bg-yellow-100 text-yellow-600 border-yellow-200' :
                        rank === 2 ? 'bg-slate-100 text-slate-600 border-slate-200' :
                            'bg-orange-100 text-orange-600 border-orange-200';
                    const icon = rank === 1 ? 'fa-crown' : 'fa-medal';

                    return `
                        <div class="flex items-center gap-4 bg-white p-4 rounded-3xl shadow-soft border border-slate-50 relative overflow-hidden">
                            <div class="flex-shrink-0 w-12 h-12 rounded-2xl ${color} flex items-center justify-center font-bold text-xl">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-900 truncate">${s.name}</h3>
                                <p class="text-xs text-slate-500">Rank #${rank}</p>
                            </div>
                            <div class="font-bold text-lg font-mono text-slate-800">${s.totalPoints}</div>
                        </div>
                    `;
                }).join('');

                // Render Rest
                listContainer.innerHTML = leaderboard.slice(3).map((s, idx) => `
                    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100">
                        <span class="w-8 text-center text-slate-400 font-bold text-sm">#${idx + 4}</span>
                        <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden">
                             ${s.profile_photo_url ? `<img src="${s.profile_photo_url}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-user"></i></div>'}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-semibold text-slate-700 text-sm truncate">${s.name}</h4>
                        </div>
                         <div class="font-medium text-slate-500 font-mono">${s.totalPoints}</div>
                    </div>
                `).join('');

            } catch (e) {
                console.error(e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => switchTab('participation'));
    </script>
</body>

</html>
