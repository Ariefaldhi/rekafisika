<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <script src="auth-guard.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | RekaFisika</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { primary: { 500: '#3B82F6', 600: '#2563EB' } }
                }
            }
        }
    </script>
    <!-- Supabase SDK MUST load before config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>
    <script>
        // Paksa lompati cache browser agar API Key baru terbaca
        document.write('<script src="config.js?t=' + new Date().getTime() + '"><\/script>');
    </script>
    <script src="modal.js"></script>
    <script src="sound-effects.js"></script>
    <style>
        .tab-active { border-bottom-color: #3B82F6; color: #2563EB; }
        .tab-inactive { border-bottom-color: transparent; color: #64748B; }
    </style>
</head>

<body class="bg-slate-50 font-inter min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl space-y-6 relative overflow-hidden">
        <div class="text-center space-y-2 relative z-10">
            <img src="logo.png" alt="Logo" class="w-16 h-16 mx-auto mb-4 object-contain animate-bounce-slow">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight" id="auth-title">Masuk</h1>
            <p class="text-slate-500 text-sm" id="auth-subtitle">Akses akun RekaFisika Anda</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-slate-200 mb-4">
            <button id="tab-login" class="flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-active transition-colors">Masuk</button>
            <button id="tab-register" class="flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-inactive transition-colors hover:text-slate-800">Daftar</button>
            <button id="tab-code" class="flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-inactive transition-colors hover:text-slate-800">Kode Guru</button>
        </div>

        <form id="auth-form" class="space-y-4">
            <!-- Register Fields (Hidden by default) -->
            <div id="register-fields" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">Nama Lengkap</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="reg-name" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700" placeholder="Contoh: Budi Santoso">
                    </div>
                </div>
                <!-- Removed NIM/NISN field -->
            </div>

            <!-- Code Mode Field (Hidden by default) -->
            <div id="code-field" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">Kode Masuk Guru (6 Digit)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-key"></i></span>
                        <input type="text" id="guest-code" maxlength="6" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700 font-bold tracking-[0.5em] text-center uppercase" placeholder="XXXXXX">
                    </div>
                </div>
            </div>

            <!-- Common Fields -->
            <div id="common-fields" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">Email</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700" placeholder="email@contoh.com" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">Kata Sandi</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700" placeholder="••••••••" required minlength="6">
                </div>
            </div> <!-- End Common Fields -->
            
            <button type="submit" id="submit-btn" class="w-full py-4 bg-primary-600 hover:bg-primary-500 text-white rounded-xl font-bold transition-all shadow-lg shadow-primary-500/30 flex justify-center items-center gap-2 mt-2">
                <span id="btn-text">Masuk</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
            <p id="error-msg" class="text-center text-red-500 text-sm hidden"></p>
        </form>

    </div>

    <script>
        let isLoginMode = true;

        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const tabCode = document.getElementById('tab-code');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const registerFields = document.getElementById('register-fields');
        const codeField = document.getElementById('code-field');
        const commonFields = document.getElementById('common-fields');
        const submitBtnText = document.getElementById('btn-text');
        const errorMsg = document.getElementById('error-msg');
        
        const regName = document.getElementById('reg-name');

        let mode = 'login'; // 'login', 'register', 'code'

        function toggleMode(newMode) {
            mode = newMode;
            errorMsg.classList.add('hidden');
            
            // Reset Tab UI
            [tabLogin, tabRegister, tabCode].forEach(t => {
                t.className = "flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-inactive transition-colors hover:text-slate-800";
            });

            const emailInput = document.getElementById('email');
            const passInput = document.getElementById('password');
            const guestInput = document.getElementById('guest-code');

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-active transition-colors";
                registerFields.classList.add('hidden');
                codeField.classList.add('hidden');
                commonFields.classList.remove('hidden');
                authTitle.innerText = "Masuk";
                authSubtitle.innerText = "Akses akun RekaFisika Anda";
                submitBtnText.innerText = "Masuk";
                
                emailInput.required = true;
                passInput.required = true;
                guestInput.required = false;
            } else if (mode === 'register') {
                tabRegister.className = "flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-active transition-colors";
                registerFields.classList.remove('hidden');
                codeField.classList.add('hidden');
                commonFields.classList.remove('hidden');
                authTitle.innerText = "Daftar";
                authSubtitle.innerText = "Buat akun baru untuk mulai belajar";
                submitBtnText.innerText = "Daftar Akun";

                emailInput.required = true;
                passInput.required = true;
                guestInput.required = false;
            } else if (mode === 'code') {
                tabCode.className = "flex-1 py-3 text-[10px] uppercase font-bold border-b-2 tab-active transition-colors";
                registerFields.classList.add('hidden');
                codeField.classList.remove('hidden');
                commonFields.classList.add('hidden');
                authTitle.innerText = "Siswa Tamu";
                authSubtitle.innerText = "Masuk menggunakan Kode Guru Anda";
                submitBtnText.innerText = "Masuk dengan Kode";

                emailInput.required = false;
                passInput.required = false;
                guestInput.required = true;
            }
        }

        tabLogin.addEventListener('click', () => toggleMode('login'));
        tabRegister.addEventListener('click', () => toggleMode('register'));
        tabCode.addEventListener('click', () => toggleMode('code'));

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (mode === 'code') {
                handleCodeLogin();
                return;
            }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');

            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';

            try {
                if (!window.supabaseClient) throw new Error('Koneksi Supabase gagal. Silakan muat ulang halaman.');

                // Admin Static Bypass
                if (email === 'admin@rekafisika.com' && password === 'reka2025' && mode === 'login') {
                    localStorage.setItem('user_session', JSON.stringify({ role: 'admin', nama: 'Admin Fisika', nim: 'admin' }));
                    window.location.href = 'admin.html';
                    return;
                }

                if (mode === 'login') {
                    // --- FLOW LOGIN ---
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    
                    if (error) {
                        if (error.status === 400) throw new Error('Email atau password salah.');
                        throw error;
                    }

                    if (!data.user) throw new Error('Gagal memuat profil pengguna.');

                    // Sync legacy user_session structure
                    const meta = data.user.user_metadata || {};
                    localStorage.setItem('user_session', JSON.stringify({
                        role: meta.role || 'student',
                        nama: meta.nama || 'Pengguna',
                        nim: data.user.email, // Use email automatically as the identifier
                        email: data.user.email
                    }));

                    window.location.href = 'index.html';

                } else {
                    // --- FLOW REGISTER ---
                    const nameUser = regName.value.trim();

                    const { data, error } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                nama: nameUser,
                                role: 'student'
                            }
                        }
                    });

                    if (error) {
                        if (error.status === 422) throw new Error('Password terlalu lemah / Email tidak valid.');
                        if (error.message.includes('already registered')) throw new Error('Email ini sudah terdaftar.');
                        throw error;
                    }
                    
                    // Since email confirm is OFF, signUp generally logs the user in and returns session immediately
                    const meta = data.user.user_metadata || {};
                    const userEmail = data.user.email;
                    const userId = data.user.id;

                    // --- Insert ke tabel students agar semua fitur yang bergantung pada nim bisa berfungsi ---
                    await supabaseClient.from('students').upsert([{
                        nim: userEmail,          // email dipakai sebagai identifier utama
                        name: nameUser,
                        role: 'student',
                        access_code: null
                    }], { onConflict: 'nim' });

                    // --- Insert ke tabel profiles agar terhubung dengan auth ---
                    await supabaseClient.from('profiles').upsert([{
                        id: userId,
                        nim: userEmail,
                        nama: nameUser,
                        role: 'student'
                    }], { onConflict: 'id' });

                    localStorage.setItem('user_session', JSON.stringify({
                        role: meta.role || 'student',
                        nama: meta.nama || nameUser,
                        nim: userEmail, // Use email as identifier
                        email: userEmail
                    }));

                    alert('Pendaftaran berhasil! Selamat bergabung di RekaFisika.');
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = `<span id="btn-text">${mode === 'login' ? 'Masuk' : (mode === 'register' ? 'Daftar' : 'Gunakan Kode')}</span> <i class="fa-solid fa-arrow-right"></i>`;
                errorMsg.textContent = err.message || 'Gagal tersambung. Periksa koneksi internet.';
                errorMsg.classList.remove('hidden');
            }
        });

        async function handleCodeLogin() {
            const code = document.getElementById('guest-code').value.trim().toUpperCase();
            if (code.length < 6) return VisualModal.alert('Masukkan 6 digit kode yang benar.', 'Kode Kurang', 'error');

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...';

            try {
                // Find teacher with this code
                const { data: teacher, error } = await supabaseClient
                    .from('profiles')
                    .select('nama, nim, teaching_code')
                    .eq('teaching_code', code)
                    .eq('role', 'teacher')
                    .maybeSingle();
                
                if (error) throw error;
                if (!teacher) throw new Error('Kode tidak ditemukan atau Guru belum mengaktifkan kode ini.');

                // Success - Create Guest Session
                localStorage.setItem('user_session', JSON.stringify({
                    is_guest: true,
                    role: 'student',
                    teaching_code: code,
                    nama: 'Tamu (' + code + ')',
                    nim: 'guest_' + code + '_' + Date.now(),
                    teacher_name: teacher.nama
                }));

                window.location.href = 'index.html';

            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = 'Masuk dengan Kode <i class="fa-solid fa-arrow-right"></i>';
            }
        }
    </script>
</body>

</html>
