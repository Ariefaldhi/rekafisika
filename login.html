<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KawanFismat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a' }, accent: { 400: '#22d3ee', 500: '#06b6d4' } }
                }
            }
        }
    </script>
    <style>
        .bg-abstract {
            background-color: #0f172a;
            background-image: radial-gradient(at 50% 50%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-abstract text-slate-100 font-inter min-h-screen flex items-center justify-center px-4">

    <div class="glass-card w-full max-w-md p-8 rounded-2xl shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-accent-400 to-blue-500"></div>

        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-accent-500/10 text-accent-400 mb-4 ring-1 ring-accent-500/20">
                <i class="fa-solid fa-atom text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold">Selamat Datang</h1>
            <p class="text-slate-400 text-sm mt-2">Portal Fisika Matematika I <br> KawanFismat</p>
        </div>

        <!-- Toggle Tabs -->
        <div class="flex p-1 bg-slate-800/50 rounded-lg mb-6">
            <button onclick="switchTab('student')" id="tab-student"
                class="flex-1 py-2 text-sm font-medium rounded-md bg-slate-700 text-white shadow transition-all">Mahasiswa</button>
            <button onclick="switchTab('admin')" id="tab-admin"
                class="flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all">Admin
                (PJ)</button>
        </div>

        <!-- Student Form -->
        <form id="form-student" class="space-y-4" onsubmit="handleLogin(event, 'student')">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wide">NIM</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" id="nim"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-2.5 pl-10 pr-4 text-white focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-all placeholder-slate-600"
                        placeholder="Contoh: 210xxxx" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wide">Kode Masuk (8
                    Digit)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500"><i class="fa-solid fa-key"></i></span>
                    <input type="password" id="access_code"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-2.5 pl-10 pr-4 text-white focus:outline-none focus:border-accent-500 focus:ring-1 focus:ring-accent-500 transition-all placeholder-slate-600"
                        placeholder="xxxxxxxx" required>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-accent-500 hover:bg-accent-600 text-white font-bold py-2.5 rounded-lg transition-colors shadow-lg shadow-accent-500/20">
                Masuk
            </button>
        </form>

        <!-- Admin Form -->
        <form id="form-admin" class="space-y-4 hidden" onsubmit="handleLogin(event, 'admin')">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wide">Username</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500"><i class="fa-solid fa-user-shield"></i></span>
                    <input type="text" id="username"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-2.5 pl-10 pr-4 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all placeholder-slate-600"
                        placeholder="Username Admin" required>
                </div>
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wide">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-slate-500"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password"
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-lg py-2.5 pl-10 pr-4 text-white focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-all placeholder-slate-600"
                        placeholder="Password" required>
                </div>
            </div>
            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2.5 rounded-lg transition-colors shadow-lg shadow-red-600/20">
                Login Admin
            </button>
        </form>

        <div id="error-msg" class="mt-4 text-center text-sm text-red-400 hidden"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('user_session')) {
            window.location.href = 'index.html';
        }

        function switchTab(role) {
            const btnStudent = document.getElementById('tab-student');
            const btnAdmin = document.getElementById('tab-admin');
            const formStudent = document.getElementById('form-student');
            const formAdmin = document.getElementById('form-admin');

            if (role === 'student') {
                btnStudent.className = 'flex-1 py-2 text-sm font-medium rounded-md bg-slate-700 text-white shadow transition-all';
                btnAdmin.className = 'flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all';
                formStudent.classList.remove('hidden');
                formAdmin.classList.add('hidden');
            } else {
                btnStudent.className = 'flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all';
                btnAdmin.className = 'flex-1 py-2 text-sm font-medium rounded-md bg-red-900/50 text-red-100 shadow ring-1 ring-red-500/50 transition-all';
                formStudent.classList.add('hidden');
                formAdmin.classList.remove('hidden');
            }
        }

        async function handleLogin(e, role) {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');
            errorMsg.innerText = '';

            if (!supabaseClient) {
                errorMsg.innerText = 'Supabase belum dikonfigurasi.';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                if (role === 'student') {
                    const nim = document.getElementById('nim').value;
                    const code = document.getElementById('access_code').value;

                    const { data, error } = await supabaseClient
                        .from('students')
                        .select('*')
                        .eq('nim', nim)
                        .eq('access_code', code)
                        .single();

                    if (error || !data) throw new Error('NIM atau Kode Salah.');

                    // Success Student
                    let sessionData = { role: 'student', ...data };

                    // Special Admin Access for Faldhi
                    // Checks if NAME contains 'Faldhi' (case insensitive) or NIM is specific
                    if (data.name.toLowerCase().includes('faldhi') || data.nim === 'FALDHI') {
                        sessionData.role = 'admin'; // Grant Admin privileges
                    }

                    localStorage.setItem('user_session', JSON.stringify(sessionData));
                    window.location.href = 'index.html';

                } else if (role === 'admin') {
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;

                    const { data, error } = await supabaseClient
                        .from('admins')
                        .select('*')
                        .eq('username', username)
                        .eq('password', password)
                        .single();

                    if (error || !data) throw new Error('Username atau Password Admin Salah.');

                    // Success Admin
                    localStorage.setItem('user_session', JSON.stringify({ role: 'admin', ...data }));
                    window.location.href = 'admin.html';
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
