<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | FisikaLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { primary: { 500: '#3B82F6', 600: '#2563EB' } }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 font-inter min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
        <div class="text-center mb-8">
            <i class="fa-solid fa-atom text-4xl text-primary-600 mb-4 animate-spin-slow"></i>
            <h1 class="text-2xl font-black text-slate-900">Selamat Datang</h1>
            <p class="text-slate-400 text-sm mt-1">Masuk untuk mulai belajar Fismat.</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">NIM</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" id="nim"
                        class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700"
                        placeholder="Contoh: 2105678" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 pl-2">Kode Akses</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400"><i class="fa-solid fa-key"></i></span>
                    <input type="password" id="access-code"
                        class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all text-slate-700"
                        placeholder="••••••" required>
                </div>
            </div>

            <button type="submit" id="login-btn"
                class="w-full py-4 bg-primary-600 hover:bg-primary-500 text-white rounded-xl font-bold font-lg transition-all shadow-lg shadow-primary-500/30 flex justify-center items-center gap-2">
                <span>Masuk</span> <i class="fa-solid fa-arrow-right"></i>
            </button>
            <p id="error-msg" class="text-center text-red-500 text-sm hidden"></p>
        </form>


    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (!window.supabase) {
            document.write('<script src="https://unpkg.com/@supabase/supabase-js@2"><\/script>');
        }
    </script>
    <script src="config.js?v=2.1"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nim = document.getElementById('nim').value;
            const code = document.getElementById('access-code').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            // Reset UI
            errorMsg.classList.add('hidden');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memuat...';

            try {
                if (!window.supabaseClient) {
                    const debugInfo = `Supabase SDK: ${typeof window.supabase}, Client: ${typeof window.supabaseClient}`;
                    throw new Error(`Supabase not configured. (${debugInfo}) - Cek URL/Key di config.js`);
                }

                // 1. Check Admin Static Login (Legacy)
                if (nim === 'admin' && code === 'fismat2025') {
                    localStorage.setItem('user_session', JSON.stringify({ role: 'admin', nama: 'Admin Fismat' }));
                    window.location.href = 'admin.html';
                    return;
                }

                // 2. Check Student Database
                const { data, error } = await supabaseClient
                    .from('students')
                    .select('*')
                    .eq('nim', nim)
                    .single();

                if (error || !data) {
                    throw new Error('NIM tidak ditemukan.');
                }

                // Verify Access Code (assuming stored column is 'access_code')
                // In a real app this should be hashed, but for restoration we match legacy which might be plain text
                if (String(data.access_code) !== code) {
                    throw new Error('Kode akses salah.');
                }

                // Success
                localStorage.setItem('user_session', JSON.stringify({
                    role: 'student',
                    nama: data.name,
                    nim: data.nim,
                    photo: data.profile_photo_url
                }));
                window.location.href = 'index.html';

            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = '<span>Masuk</span> <i class="fa-solid fa-arrow-right"></i>';
                errorMsg.textContent = err.message || 'Gagal masuk. Periksa koneksi.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
