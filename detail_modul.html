<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materi | RekaFisika</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        .pdf-page-enter {
            animation: slideInRight 0.3s ease-out;
        }

        .pdf-page-leave {
            animation: slideOutLeft 0.3s ease-in;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
    <!-- Supabase SDK MUST load before config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>
    <script src="config.js?v=2.5"></script>
    <script src="modal.js"></script>
    <script src="sound-effects.js"></script>
    <style>
    <style>
        .module-page {
            min-height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .immersive-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        /* Desktop specific tweaks */
        @media (min-width: 1024px) {
            #page-container {
                max-width: 80rem; /* max-w-7xl approx */
            }
            .step-content-wrapper {
                max-width: 64rem; /* max-w-5xl */
                margin-left: auto;
                margin-right: auto;
                width: 100%;
            }
        }

        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #fake-loader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <div class="max-w-7xl mx-auto relative min-h-screen flex flex-col">

    <!-- Fake Loader -->
    <div id="fake-loader">
        <div class="w-16 h-16 border-4 border-slate-100 border-t-primary-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-bold mt-20 animate-pulse uppercase tracking-widest text-xs">Memuat Materi...</p>
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="modul.html" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-0.5">Modul Pembelajaran</p>
                <h1 id="m-title" class="text-sm font-bold text-slate-800 line-clamp-1">--</h1>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-primary-50 flex items-center justify-center text-primary-500">
                <i class="fa-solid fa-book-open text-xs"></i>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="px-4 py-6 flex-1 flex flex-col relative overflow-hidden" id="page-container">
        <!-- ALL PAGES WILL BE INJECTED HERE -->
    </main>

    <!-- Step Navigation (Footer) -->
    <div class="fixed bottom-0 left-0 w-full px-6 pb-6 pt-10 pointer-events-none z-50">
        <div
            class="max-w-4xl mx-auto bg-white/90 backdrop-blur-xl border border-slate-200 p-4 shadow-2xl rounded-3xl pointer-events-auto flex items-center justify-between gap-4">
            <button onclick="changePage(-1)" id="btn-prev"
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-chevron-left"></i>
                <span class="hidden sm:inline">Sebelumnya</span>
            </button>
            <div class="flex-1 text-center">
                <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest mb-0.5" id="counter-label">Halaman</p>
                <p class="text-sm font-bold text-slate-700" id="step-counter">0 / 0</p>
            </div>
            <button onclick="changePage(1)" id="btn-next"
                class="flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold bg-primary-500 text-white shadow-lg shadow-primary-500/30 hover:bg-primary-600 transition-all">
                <span id="btn-next-text" class="hidden sm:inline">Selanjutnya</span>
                <i id="btn-next-icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        let ytPlayers = {}; 
        let currentPageIndex = 0;
        let totalPages = 0;
        let moduleData = null;

        async function loadDetail() {
            if (!id) return;
            if (!await window.ensureSupabase()) return;

            const { data: modul } = await supabaseClient.from('modules').select('*').eq('id', id).single();
            if (!modul) {
                document.getElementById('page-container').innerHTML = '<div class="text-center p-10 text-red-500">Materi tidak ditemukan.</div>';
                return;
            }

            if (modul.is_locked) {
                await VisualModal.alert('Modul ini terkunci dan belum dibuka oleh Admin.', 'Akses Ditolak', 'lock');
                window.location.href = 'modul.html';
                return;
            }

            moduleData = modul;
            const user = checkAuth();

            document.title = `${modul.topic} | RekaFisika`;
            document.getElementById('m-title').innerText = modul.topic;

            const pageContainer = document.getElementById('page-container');
            pageContainer.innerHTML = ''; // Clear previous

            // PAGE 0: COVER (Responsive Desktop/Mobile)
            const coverPage = document.createElement('div');
            coverPage.className = 'module-page animate-slide-up flex flex-col justify-center';
            
            const lkpdSection = modul.lkpd_url ? `
                <div class="lg:w-80 shrink-0">
                    <div class="p-1 bg-gradient-to-br from-amber-400 to-orange-500 rounded-3xl shadow-xl shadow-orange-500/20">
                        <div class="bg-white rounded-[22px] p-6 space-y-4">
                            <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center">
                                <i class="fa-solid fa-file-pdf text-amber-500 text-2xl"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-amber-500 mb-1">Instruksi Belajar</p>
                                <h4 class="font-bold text-slate-800 text-sm line-clamp-2 leading-tight">${modul.lkpd_title || 'LKPD ' + modul.topic}</h4>
                            </div>
                            <a href="${modul.lkpd_url}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-xs hover:bg-slate-800 transition-colors">
                                <i class="fa-solid fa-download"></i> Download LKPD
                            </a>
                            <p class="text-[10px] text-slate-400 italic text-center leading-relaxed">Persiapkan LKPD ini sebelum memulai langkah pembelajaran.</p>
                        </div>
                    </div>
                </div>` : '';

            coverPage.innerHTML = `
                <div class="w-full max-w-6xl mx-auto flex flex-col lg:flex-row gap-8 lg:items-center py-8">
                    <div class="flex-1 space-y-6">
                        <div class="space-y-2">
                             <span class="px-3 py-1 bg-primary-50 text-primary-600 rounded-full text-[10px] font-black uppercase tracking-widest">Materi Inti</span>
                             <h2 class="text-4xl lg:text-5xl font-black text-slate-900 leading-tight">${modul.topic}</h2>
                        </div>
                        <div class="prose prose-slate lg:prose-lg max-w-none text-slate-600">
                            ${marked.parse(modul.description || 'Tidak ada deskripsi.')}
                        </div>
                        <div class="flex items-center gap-6 pt-4 border-t border-slate-100 lg:hidden">
                            ${lkpdSection}
                        </div>
                    </div>
                    <div class="hidden lg:block">
                        ${lkpdSection}
                    </div>
                </div>
            `;
            pageContainer.appendChild(coverPage);

            // STEPS AS PAGES
            try {
                if (modul.steps && Array.isArray(modul.steps)) {
                    modul.steps.forEach((step, idx) => {
                        const stepPage = document.createElement('div');
                        stepPage.className = 'module-page hidden animate-slide-up';
                        
                        let contentHtml = '';
                        if (['pdf', 'ppt'].includes(step.type)) {
                            const canvasId = `pdf-canvas-${idx}`;
                            const controlId = `pdf-controls-${idx}`;
                            setTimeout(() => renderEmbeddedPDF(step.url, canvasId, controlId, step.start_page, step.end_page), 500);
                            contentHtml = `<div class="w-full bg-slate-100 rounded-3xl overflow-hidden border border-slate-200 mt-2 relative group isolate lg:min-h-[500px]">
                                <div class="flex justify-center items-center h-full bg-slate-500 overflow-hidden relative min-h-[400px]">
                                    <canvas id="${canvasId}" class="max-w-full shadow-2xl transition-transform duration-300"></canvas>
                                    <div id="${canvasId}-loader" class="absolute inset-0 flex items-center justify-center bg-slate-100 z-10"><div class="flex flex-col items-center gap-2"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-primary-500"></i><span class="text-xs font-bold text-slate-400">Memuat Dokumen...</span></div></div>
                                </div>
                                <div id="${controlId}" class="bg-white border-t border-slate-200 p-3 flex justify-between items-center gap-4 sticky bottom-0 z-20">
                                    <button class="prev-btn w-12 h-12 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 disabled:opacity-30"><i class="fa-solid fa-left-long"></i></button>
                                    <div class="text-center"><span class="text-[10px] text-slate-400 font-bold uppercase block">Hlm</span><span class="curr-page text-lg font-black text-slate-800">-</span><span class="text-slate-400 text-sm font-bold mx-1">/</span><span class="total-page text-sm font-bold text-slate-500">-</span></div>
                                    <button class="next-btn w-12 h-12 flex items-center justify-center rounded-xl bg-primary-600 text-white shadow-lg disabled:opacity-50"><i class="fa-solid fa-right-long"></i></button>
                                </div>
                            </div>`;
                        } else if (step.type === 'video') {
                            const playerId = `yt-player-${idx}`;
                            contentHtml = `<div class="mt-2 relative w-full"><div id="${playerId}" class="aspect-video w-full rounded-3xl overflow-hidden shadow-2xl bg-slate-900"></div>${ step.end_time ? `<p class="text-[10px] text-slate-400 mt-3 text-center font-bold tracking-widest uppercase">⏱ Waktunya Tonton: ${formatTime(step.start_time || 0)} — ${formatTime(step.end_time)}</p>` : '' }</div>`;
                            setTimeout(() => initRestrictedYT(playerId, step.url, step.start_time || 0, step.end_time || null), 500);
                        } else if (step.type === 'phet') {
                            contentHtml = `<div class="mt-2 space-y-4 w-full"><div class="flex items-start gap-4 p-4 bg-yellow-50/50 border border-yellow-200 rounded-2xl"><i class="fa-solid fa-lightbulb text-yellow-500 mt-1"></i><p class="text-xs text-yellow-800 italic leading-relaxed">Eksplorasi simulasi di bawah. Jika instruksi kurang jelas, silakan buka <span class="font-bold underline cursor-pointer" onclick="window.open('${modul.lkpd_url}', '_blank')">LKPD</span> kembali.</p></div><div class="w-full rounded-2xl overflow-hidden border border-slate-200 shadow-xl" style="height:580px"><iframe src="${step.url}" class="w-full h-full" allowfullscreen sandbox="allow-scripts allow-same-origin"></iframe></div></div>`;
                        } else if (step.type === 'refleksi') {
                            const qHtml = (step.questions || []).map((q, qi) => `<div class="space-y-3 p-6 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-sm font-bold text-slate-700">${qi + 1}. ${q}</p><textarea class="refleksi-answer w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all outline-none resize-none" rows="3" data-qi="${qi}" placeholder="Ketik jawabanmu di sini..."></textarea></div>`).join('');
                            contentHtml = `<div class="mt-2 space-y-4 w-full">${qHtml}<button onclick="saveRefleksiAnswers(this, '${id}', ${idx})" class="w-full py-4 bg-slate-900 border-b-4 border-slate-800 text-white rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:transform active:translate-y-1 active:border-b-0"><i class="fa-solid fa-floppy-disk mr-2"></i>Simpan Hasil Refleksi</button><div class="refleksi-status text-[10px] text-center text-slate-400 uppercase font-bold tracking-widest"></div></div>`;
                        } else {
                            contentHtml = `<div class="mt-2 p-8 bg-slate-50 rounded-3xl border border-dotted border-slate-300 flex flex-col items-center text-center gap-4"><div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-slate-300 text-2xl shadow-sm"><i class="fa-solid fa-link"></i></div><div class="space-y-1"><h4 class="font-bold text-slate-700">Tautan Eksternal</h4><p class="text-xs text-slate-400 line-clamp-1">${step.url}</p></div><a href="${step.url}" target="_blank" class="px-8 py-3 bg-white border border-slate-200 rounded-xl text-xs font-black uppercase text-primary-500 hover:bg-primary-50 hover:border-primary-100 transition-all">Buka Tautan</a></div>`;
                        }

                        const typeConfig = {
                            ppt: { icon: 'fa-file-powerpoint', color: 'text-orange-500 bg-orange-50', label: 'Presentasi PPT' },
                            pdf: { icon: 'fa-file-pdf', color: 'text-red-500 bg-red-50', label: 'Dokumen Materi' },
                            video: { icon: 'fa-play-circle', color: 'text-red-500 bg-red-100', label: 'Eksplorasi Video' },
                            phet: { icon: 'fa-flask', color: 'text-emerald-600 bg-emerald-50', label: 'Simulasi Interaktif' },
                            refleksi: { icon: 'fa-brain', color: 'text-purple-600 bg-purple-50', label: 'Fase Refleksi' },
                            link: { icon: 'fa-link', color: 'text-blue-500 bg-blue-50', label: 'Referensi Tambahan' }
                        };
                        const tc = typeConfig[step.type] || typeConfig.link;

                        stepPage.innerHTML = `
                            <div class="step-content-wrapper flex-1 flex flex-col py-6">
                                <div class="flex items-center justify-between gap-4 mb-6">
                                    <div class="flex items-center gap-4">
                                        <span class="w-12 h-12 rounded-2xl ${tc.color} font-bold flex items-center justify-center text-xl shadow-sm"><i class="fa-solid ${tc.icon}"></i></span>
                                        <div>
                                            <h4 class="text-xl font-black text-slate-900 leading-tight">${step.title}</h4>
                                            <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400">${tc.label}</span>
                                        </div>
                                    </div>
                                    <div class="text-right hidden sm:block">
                                        <p class="text-[9px] uppercase font-black text-slate-300 tracking-tighter">Langkah ${idx+1}</p>
                                    </div>
                                </div>
                                
                                <div class="immersive-content space-y-6">
                                    ${step.instruction ? `<div class="bg-primary-50 text-primary-900 text-sm p-5 rounded-2xl border-l-4 border-primary-500 shadow-sm"><div class="flex items-start gap-4"><i class="fa-solid fa-circle-nodes text-primary-500 mt-0.5"></i><p class="leading-relaxed font-medium">${step.instruction}</p></div></div>` : ''}
                                    ${contentHtml}
                                    ${step.question ? `<div class="p-6 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl"><div class="flex items-start gap-4 mb-4"><i class="fa-solid fa-puzzle-piece text-primary-400 mt-1"></i><div><p class="text-[10px] uppercase font-black text-slate-500 tracking-widest mb-1">Cek Pemahaman</p><p class="text-white font-bold leading-relaxed">${step.question}</p></div></div><div class="flex gap-2"><input type="text" placeholder="Masukkan jawaban..." class="quiz-input flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white focus:ring-2 focus:ring-primary-500 outline-none transition-all placeholder:text-slate-600"><button onclick="checkQuiz(this, '${step.answer_key}')" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition-all">Verifikasi</button></div></div>` : ''}
                                </div>
                            </div>
                        `;
                        pageContainer.appendChild(stepPage);
                    });
                }

                totalPages = pageContainer.querySelectorAll('.module-page').length;
                updatePaging();
                
                if (user) loadRefleksiAnswers(id, user);
                if (window.MathJax) MathJax.typesetPromise();
            } catch (e) {
                console.error("Load Detail Error:", e);
            } finally {
                // HIDE LOADER
                const loader = document.getElementById('fake-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }
            }
        }

        function updatePaging() {
            const pages = document.querySelectorAll('.module-page');
            pages.forEach((p, i) => {
                if (i === currentPageIndex) p.classList.remove('hidden');
                else p.classList.add('hidden');
            });

            // Update Counter
            document.getElementById('step-counter').innerText = `${currentPageIndex + 1} / ${totalPages}`;
            document.getElementById('counter-label').innerText = currentPageIndex === 0 ? 'Cover' : 'Langkah';

            // Buttons State
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const btnNextText = document.getElementById('btn-next-text');
            const btnNextIcon = document.getElementById('btn-next-icon');

            btnPrev.disabled = currentPageIndex === 0;

            if (currentPageIndex === totalPages - 1) {
                btnNextText.innerText = "Selesaikan Modul";
                btnNextIcon.className = "fa-solid fa-check-circle ml-2";
                btnNext.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold bg-emerald-500 text-white shadow-lg shadow-emerald-500/30 hover:bg-emerald-600 transition-all";
            } else {
                btnNextText.innerText = "Selanjutnya";
                btnNextIcon.className = "fa-solid fa-chevron-right ml-2";
                btnNext.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl font-bold bg-primary-500 text-white shadow-lg shadow-primary-500/30 hover:bg-primary-600 transition-all";
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function changePage(dir) {
            if (dir === 1 && currentPageIndex === totalPages - 1) {
                const user = checkAuth();
                completeModule(moduleData.id, user);
                return;
            }

            const nextIdx = currentPageIndex + dir;
            if (nextIdx >= 0 && nextIdx < totalPages) {
                currentPageIndex = nextIdx;
                updatePaging();
            }
        }

        // Logic Re-checks (Legacy)
        window.checkQuiz = (btn, key) => {
            const input = btn.previousElementSibling;
            if (input.value.toLowerCase().trim() === key.toLowerCase().trim()) {
                input.className = input.className.replace('bg-slate-50', 'bg-emerald-50 border-emerald-200 text-emerald-700');
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.disabled = true;
                if (window.SFX) window.SFX.play('success');
            } else {
                input.classList.add('animate-shake', 'border-red-300', 'bg-red-50');
                setTimeout(() => input.classList.remove('animate-shake', 'border-red-300', 'bg-red-50'), 500);
            }
        };

        async function renderEmbeddedPDF(url, canvasId, controlId, startPage, endPage) {
            const canvas = document.getElementById(canvasId);
            const loader = document.getElementById(canvasId + '-loader');
            const controls = document.getElementById(controlId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            let pdfDoc = null;
            let pageNum = startPage || 1;
            let pageRendering = false;
            let pageNumPending = null;
            const scale = 1.5; // High quality

            try {
                const loadingTask = pdfjsLib.getDocument(url);
                pdfDoc = await loadingTask.promise;

                const maxPage = endPage ? Math.min(endPage, pdfDoc.numPages) : pdfDoc.numPages;
                const minPage = startPage || 1;

                // Update Total Page UI
                controls.querySelector('.total-page').textContent = maxPage;

                // Render Page Function
                const renderPage = async (num) => {
                    pageRendering = true;
                    // Update UI State
                    controls.querySelector('.curr-page').textContent = num;
                    controls.querySelector('.prev-btn').disabled = num <= minPage;
                    controls.querySelector('.next-btn').disabled = num >= maxPage;

                    const page = await pdfDoc.getPage(num);

                    // Responsive Scale
                    const viewport = page.getViewport({ scale: scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };

                    const renderTask = page.render(renderContext);
                    await renderTask.promise;
                    pageRendering = false;

                    if (loader) loader.classList.add('hidden');

                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                };

                const queueRenderPage = (num) => {
                    if (pageRendering) {
                        pageNumPending = num;
                    } else {
                        renderPage(num);
                    }
                };

                renderPage(pageNum);

                controls.querySelector('.prev-btn').onclick = () => {
                    if (pageNum <= minPage) return;
                    pageNum--;
                    queueRenderPage(pageNum);
                };
                controls.querySelector('.next-btn').onclick = () => {
                    if (pageNum >= maxPage) return;
                    pageNum++;
                    queueRenderPage(pageNum);
                };

                    } catch (e) {
                        console.error("PDF Load Error:", e);
                        if (loader) {
                            loader.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Gagal memuat dokumen.<br><span class="text-xs font-normal text-slate-500">${e.message}</span></div>`;
                        }
                    }
                }

        // --- YouTube Restricted Player ---
        function getYouTubeId(url) {
            if (!url) return null;
            const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (m && m[2].length === 11) ? m[2] : url;
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function initRestrictedYT(containerId, url, startSec, endSec) {
            const ytId = getYouTubeId(url);
            if (!ytId) return;

            const player = new YT.Player(containerId, {
                videoId: ytId,
                playerVars: {
                    start: startSec,
                    autoplay: 0,
                    rel: 0,
                    modestbranding: 1,
                    disablekb: 1,
                    fs: 1,
                    iv_load_policy: 3,
                },
                events: {
                    onReady: (e) => {
                        ytPlayers[containerId] = e.target;
                        if (endSec) {
                            setInterval(() => {
                                const p = ytPlayers[containerId];
                                if (!p) return;
                                const cur = p.getCurrentTime();
                                if (cur < startSec) p.seekTo(startSec, true);
                                if (cur > endSec) {
                                    p.pauseVideo();
                                    p.seekTo(endSec, true);
                                }
                            }, 500);
                        }
                    },
                    onStateChange: (e) => {
                        if (e.data === YT.PlayerState.PLAYING) {
                            const p = ytPlayers[containerId];
                            if (!p) return;
                            const cur = p.getCurrentTime();
                            if (cur < startSec) p.seekTo(startSec, true);
                        }
                    }
                }
            });
        }

        // --- Save Refleksi Answers ---
        async function saveRefleksiAnswers(btn, moduleId, stepIdx) {
            const user = checkAuth();
            if (!user) { await VisualModal.alert('Silakan login terlebih dahulu.', 'Login', 'error'); return; }

            const stepCard = btn.closest('.step-content-wrapper');
            const textareas = stepCard.querySelectorAll('.refleksi-answer');
            const statusEl = stepCard.querySelector('.refleksi-status');

            const answers = Array.from(textareas).map(ta => ({
                question_index: parseInt(ta.dataset.qi),
                answer: ta.value
            }));

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Menyimpan...';

            try {
                const { error } = await supabaseClient.from('reflection_answers').upsert({
                    student_nim: user.nim,
                    module_id: moduleId,
                    step_index: stepIdx,
                    answers: answers,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'student_nim, module_id, step_index' });

                if (error) throw error;

                btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Tersimpan!';
                btn.className = btn.className.replace('bg-purple-600 hover:bg-purple-700', 'bg-emerald-500 hover:bg-emerald-600');
                if (statusEl) statusEl.textContent = 'Jawaban tersimpan pada ' + new Date().toLocaleTimeString('id-ID');

                // Auto-check the step (Disabled in paging mode)
                // const cb = stepCard.querySelector('.step-check');
                // if (cb && !cb.checked) { cb.checked = true; toggleStep(parseInt(cb.dataset.idx)); }

            } catch (e) {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i>Simpan Jawaban Refleksi';
                btn.disabled = false;
                if (statusEl) statusEl.textContent = 'Gagal: ' + e.message;
            }
        }

        // --- Load saved refleksi answers ---
        async function loadRefleksiAnswers(moduleId, user) {
            if (!user) return;
            const { data } = await supabaseClient.from('reflection_answers')
                .select('*').eq('student_nim', user.nim).eq('module_id', moduleId);
            if (!data) return;
            data.forEach(row => {
                const stepCard = document.querySelectorAll('.step-content-wrapper')[row.step_index];
                if (!stepCard) return;
                row.answers.forEach(a => {
                    const ta = stepCard.querySelector(`.refleksi-answer[data-qi="${a.question_index}"]`);
                    if (ta) ta.value = a.answer || '';
                });
            });
        }
        async function completeModule(moduleId, user) {
            if (!user) { await VisualModal.alert('Silakan login terlebih dahulu.', 'Akses Ditolak', 'error'); return; }
            if (!await VisualModal.confirm('Apakah anda sudah mempelajari semua materi? Tugas terkait akan otomatis ditandai selesai.', 'Konfirmasi Selesai')) return;

            try {
                // 1. Mark Module Progress
                await supabaseClient.from('module_progress').upsert({
                    student_nim: user.nim,
                    module_id: moduleId,
                    is_completed: true,
                    completed_at: new Date().toISOString()
                }, { onConflict: 'student_nim, module_id' });

                // 2. Find Linked Assignment
                const { data: task } = await supabaseClient.from('assignments').select('id').eq('module_id', moduleId).eq('is_active', true).single();

                // PLAY SUCCESS SOUND
                if (window.SFX) window.SFX.play('success');

                if (task) {
                    // 3. Submit Task (Auto)
                    await supabaseClient.from('assignment_submissions').upsert({
                        student_nim: user.nim,
                        assignment_id: task.id,
                        checked: true,
                        score: 100,
                        submitted_at: new Date().toISOString()
                    }, { onConflict: 'student_nim, assignment_id' });

                    await VisualModal.alert('Selamat! Modul diselesaikan. Tugas terkait telah otomatis dikumpulkan', 'Luar Biasa!', 'success');
                } else {
                    await VisualModal.alert('Modul diselesaikan. (Tidak ada tugas terkait)', 'Sukses', 'success');
                }

                window.location.href = 'index.html';
            } catch (e) {
                console.error(e);
                VisualModal.alert('Gagal menyimpan progress: ' + e.message, 'Error', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDetail();

            // Fake Loading Logic
            setTimeout(() => {
                const loader = document.getElementById('fake-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }
            }, 5000); // 2.5 seconds delay
        });
    </script>
