<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materi | FisikaLab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex items-center gap-4">
        <a href="modul.html"
            class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-bold text-slate-900 truncate" id="m-title">Memuat Materi...</h1>
    </div>

    <!-- Content -->
    <main class="px-4 py-6 max-w-3xl mx-auto space-y-6">

        <!-- Hero Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 opacity-10 rounded-full blur-2xl -mr-10 -mt-10">
            </div>

            <span id="m-week"
                class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold mb-4">Minggu
                --</span>
            <h2 id="m-topic" class="text-2xl font-black text-slate-900 mb-2">--</h2>
            <div id="m-desc" class="prose prose-slate prose-sm max-w-none text-slate-600">
                <!-- Markdown Content -->
            </div>
        </div>

        <!-- Video Section (Placeholder / If Exists) -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hidden" id="video-section">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-brands fa-youtube text-red-500"></i> Video Pembelajaran
            </h3>
            <div class="aspect-video bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                <i class="fa-solid fa-play-circle text-6xl text-slate-300"></i>
            </div>
        </div>

        <!-- Resources -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-paperclip text-slate-400"></i> Sumber Belajar
            </h3>
            <div class="space-y-3">
                <a href="buku.html"
                    class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white hover:shadow-md transition-all group">
                    <div
                        class="w-10 h-10 bg-red-100 text-red-500 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-file-pdf"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-700 text-sm">Buku Teks Utama</h4>
                        <p class="text-xs text-slate-400">PDF Reference</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300"></i>
                </a>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-between items-center pt-6">
            <button id="prev-modul"
                class="px-6 py-3 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold text-sm hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-arrow-left mr-2"></i> Sebelumnya
            </button>
            <button id="next-modul"
                class="px-6 py-3 rounded-xl bg-primary-600 text-white font-bold text-sm shadow-lg shadow-blue-500/30 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed">
                Selanjutnya <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function loadDetail() {
            if (!id || !window.supabaseClient) return;

            // Fetch Current
            const { data: modul, error } = await supabaseClient.from('modules').select('*').eq('id', id).single();

            if (modul) {
                document.title = `${modul.topic} | FisikaLab`;
                document.getElementById('m-title').innerText = modul.topic;
                document.getElementById('m-topic').innerText = modul.topic;
                document.getElementById('m-week').innerText = `Minggu ${modul.week}`;
                document.getElementById('m-desc').innerHTML = marked.parse(modul.description || '');

                // MathJax
                if (window.MathJax) MathJax.typesetPromise();

                // Check Prev/Next
                checkSiblings(modul.week);
            } else {
                document.querySelector('main').innerHTML = '<div class="text-center p-10 text-red-500">Materi tidak ditemukan.</div>';
            }
        }

        async function checkSiblings(currentWeek) {
            const { data: next } = await supabaseClient.from('modules').select('id').gt('week', currentWeek).order('week').limit(1).single();
            const { data: prev } = await supabaseClient.from('modules').select('id').lt('week', currentWeek).order('week', { ascending: false }).limit(1).single();

            const nextBtn = document.getElementById('next-modul');
            const prevBtn = document.getElementById('prev-modul');

            if (next) nextBtn.onclick = () => window.location.href = `detail_modul.html?id=${next.id}`;
            else nextBtn.disabled = true;

            if (prev) prevBtn.onclick = () => window.location.href = `detail_modul.html?id=${prev.id}`;
            else prevBtn.disabled = true;
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
