<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materi | Kawan Fismat</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <style>
        .pdf-page-enter {
            animation: slideInRight 0.3s ease-out;
        }

        .pdf-page-leave {
            animation: slideOutLeft 0.3s ease-in;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
    <!-- Supabase SDK MUST load before config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>
    <script src="config.js?v=2.5"></script>
    <script src="modal.js"></script>
    <script src="sound-effects.js"></script>
    <style>
        #fake-loader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Fake Loader -->
    <div id="fake-loader">
        <div class="w-16 h-16 border-4 border-slate-100 border-t-primary-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 font-bold mt-20 animate-pulse">Memuat Materi...</p>
    </div>

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex items-center gap-4">
        <a href="modul.html"
            class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-bold text-slate-900 truncate" id="m-title">Memuat Materi...</h1>
    </div>

    <!-- Content -->
    <main class="px-4 py-6 max-w-3xl mx-auto space-y-6">

        <!-- Hero Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 opacity-10 rounded-full blur-2xl -mr-10 -mt-10">
            </div>

            <span id="m-week"
                class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold mb-4">Minggu
                --</span>
            <h2 id="m-topic" class="text-2xl font-black text-slate-900 mb-2">--</h2>
            <div id="m-desc" class="prose prose-slate prose-sm max-w-none text-slate-600">
                <!-- Markdown Content -->
            </div>
        </div>

        <!-- Video Section (Placeholder / If Exists) -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hidden" id="video-section">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-brands fa-youtube text-red-500"></i> Video Pembelajaran
            </h3>
            <div class="aspect-video bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                <i class="fa-solid fa-play-circle text-6xl text-slate-300"></i>
            </div>
        </div>

        <!-- Resources (Removed) -->

        <!-- Navigation Buttons -->
        <!-- Navigation Buttons (Removed) -->

    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function loadDetail() {
            if (!id) return;
            // Wait for Supabase
            if (!await window.ensureSupabase()) return;

            // Fetch Current Module
            const { data: modul } = await supabaseClient.from('modules').select('*').eq('id', id).single();

            if (modul && modul.is_locked) {
                await VisualModal.alert('Modul ini terkunci dan belum dibuka oleh Admin.', 'Akses Ditolak', 'lock');
                window.location.href = 'modul.html';
                return;
            }

            const user = checkAuth(); // Need user for progress

            if (modul) {
                document.title = `${modul.topic} | FisikaLab`;
                document.getElementById('m-title').innerText = modul.topic;
                document.getElementById('m-topic').innerText = modul.topic;
                document.getElementById('m-week').innerText = `Minggu ${modul.week}`;
                document.getElementById('m-desc').innerHTML = marked.parse(modul.description || '');

                const vidSec = document.getElementById('video-section');

                // --- RENDER STEPS (JSON) ---
                // --- RENDER STEPS (JSON) ---
                const stepsContainer = document.createElement('div');
                stepsContainer.className = 'space-y-8 mb-8';

                if (modul.steps && Array.isArray(modul.steps) && modul.steps.length > 0) {
                    // Remove legacy video section if steps exist (to avoid duplicate/confusion)
                    if (vidSec) vidSec.remove();

                    // Insert AFTER the Hero Card (Topic/Description)
                    const heroCard = document.querySelector('.bg-white.p-6.rounded-3xl.shadow-sm.border.border-slate-100.relative');
                    heroCard.insertAdjacentElement('afterend', stepsContainer);

                    stepsContainer.innerHTML = '<h3 class="font-bold text-slate-800 text-lg mb-4">Langkah Pembelajaran</h3>';

                    modul.steps.forEach((step, idx) => {
                        let contentHtml = '';

                        // 1. PDF / PPT (Embedded Canvas Slide)
                        if (['pdf', 'ppt'].includes(step.type)) {
                            const canvasId = `pdf-canvas-${idx}`;
                            const controlId = `pdf-controls-${idx}`;

                            // Initial render call after DOM insertion
                            setTimeout(() => {
                                renderEmbeddedPDF(step.url, canvasId, controlId, step.start_page, step.end_page);
                            }, 100);

                            contentHtml = `
                                <div class="w-full bg-slate-100 rounded-xl overflow-hidden border border-slate-200 mt-2 relative group isolate">
                                    <!-- Canvas Wrapper -->
                                    <div class="flex justify-center items-center min-h-[300px] md:min-h-[400px] bg-slate-500 overflow-hidden relative">
                                        <canvas id="${canvasId}" class="max-w-full shadow-2xl transition-transform duration-300"></canvas>
                                        
                                        <!-- Loading Spinner -->
                                        <div id="${canvasId}-loader" class="absolute inset-0 flex items-center justify-center bg-slate-100 z-10">
                                            <div class="flex flex-col items-center gap-2">
                                                <i class="fa-solid fa-circle-notch fa-spin text-3xl text-primary-500"></i>
                                                <span class="text-xs font-bold text-slate-400">Memuat Dokumen...</span>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Controls (Mobile Optimized) -->
                                    <div id="${controlId}" class="bg-white border-t border-slate-200 p-3 flex justify-between items-center gap-4 sticky bottom-0 z-20">
                                        <button class="prev-btn w-12 h-12 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 active:scale-95 transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                                            <i class="fa-solid fa-arrow-left text-lg"></i>
                                        </button>
                                        
                                        <div class="flex-1 flex flex-col items-center justify-center">
                                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Halaman</span>
                                            <div class="flex items-baseline gap-1">
                                                <span class="curr-page text-xl font-black text-slate-800">-</span>
                                                <span class="text-slate-400 text-sm font-bold">/</span>
                                                <span class="total-page text-sm font-bold text-slate-500">-</span>
                                            </div>
                                        </div>

                                        <button class="next-btn w-12 h-12 flex items-center justify-center rounded-xl bg-primary-600 text-white shadow-lg shadow-primary-500/20 hover:bg-primary-500 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                                            <i class="fa-solid fa-arrow-right text-lg"></i>
                                        </button>
                                    </div>
                                </div>
                             `;
                        } else if (step.type === 'video') {
                            // 2. Video (YouTube Embed)
                            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                            const match = step.url.match(regExp);
                            const ytId = (match && match[2].length === 11) ? match[2] : null;
                            const embedUrl = ytId ? `https://www.youtube.com/embed/${ytId}` : step.url;

                            contentHtml = `
                                <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden shadow-lg mt-2">
                                     <iframe class="w-full h-full" src="${embedUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>
                             `;
                        } else {
                            // 3. Link / Other
                            contentHtml = `
                                <div class="mt-2 text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center gap-3">
                                    <i class="fa-solid fa-link text-slate-400"></i>
                                    <a href="${step.url}" target="_blank" class="text-blue-600 hover:underline break-all">${step.url}</a>
                                </div>
                             `;
                        }

                        // Wrapper Card
                        const wrapper = `
                           <div class="step-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative">
                               <div class="flex justify-between items-start gap-4 mb-2">
                                   <div class="flex items-center gap-3">
                                       <span class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold flex items-center justify-center text-sm border border-slate-200">${idx + 1}</span>
                                       <div>
                                           <h4 class="font-bold text-slate-800">${step.title}</h4>
                                           <div class="flex gap-2 text-xs">
                                              <span class="uppercase text-slate-400 font-bold tracking-wider">${step.type}</span>
                                           </div>
                                       </div>
                                   </div>
                                    <label class="flex items-center gap-3 cursor-pointer select-none">
                                        <input type="checkbox" data-idx="${idx}" class="step-check w-5 h-5 text-emerald-500 rounded focus:ring-emerald-500 cursor-pointer" onchange="toggleStep(${idx})">
                                        <span class="text-sm font-bold text-slate-500">Selesai</span>
                                    </label>
                               </div>

                               ${step.instruction ? `<div class="bg-blue-50 text-blue-700 text-sm p-3 rounded-lg mb-3 border border-blue-100"><i class="fa-solid fa-circle-info mr-2"></i>${step.instruction}</div>` : ''}

                               ${contentHtml}
                               ${step.question ? `
                                   <div class="mt-4 pt-4 border-t border-slate-100">
                                       <p class="text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-circle-question text-primary-500 mr-2"></i>Kuis: ${step.question}</p>
                                       <div class="flex gap-2">
                                           <input type="text" placeholder="Jawaban Anda..." class="quiz-input w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                                           <button onclick="checkQuiz(this, '${step.answer_key}')" class="bg-primary-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Cek</button>
                                       </div>
                                   </div>
                               ` : ''}
                           </div>
                        `;
                        stepsContainer.innerHTML += wrapper;
                    });

                    // LOAD PROGRESS
                    loadStepProgress(modul.id, user);
                }

                // --- PROGRESS ACTION ---
                const actionBtn = document.createElement('button');
                actionBtn.id = 'complete-btn';
                actionBtn.className = 'w-full py-4 mt-6 bg-slate-200 text-slate-400 rounded-2xl font-bold cursor-not-allowed transition-all';
                actionBtn.disabled = true;
                actionBtn.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> Selesaikan Semua Langkah Dulu';
                actionBtn.onclick = () => completeModule(modul.id, user);
                document.querySelector('main').appendChild(actionBtn);

                // Main Logic for Toggling Steps
                window.toggleStep = async (idx) => {
                    const checkbox = document.querySelector(`.step-check[data-idx="${idx}"]`);
                    checkAllSteps(); // Update UI first for responsiveness

                    if (user) {
                        try {
                            // Get all checked indicies
                            const checkedNodes = document.querySelectorAll('.step-check:checked');
                            const completedSteps = Array.from(checkedNodes).map(cb => parseInt(cb.dataset.idx));

                            // Save to DB
                            await supabaseClient.from('module_progress').upsert({
                                student_nim: user.nim,
                                module_id: id,
                                completed_steps: completedSteps,
                                last_accessed: new Date().toISOString()
                            }, { onConflict: 'student_nim, module_id' });

                        } catch (e) {
                            console.error("Save step error:", e);
                            VisualModal.alert("Gagal menyimpan progress! \nKemungkinan database belum diupdate. \nSilakan jalankan file 'add_step_progress_col.sql' di Supabase.", 'Error', 'error');
                        }
                    }
                };

                // Load Initial
                async function loadStepProgress(modId, user) {
                    if (!user) return;
                    const { data } = await supabaseClient.from('module_progress').select('completed_steps').eq('student_nim', user.nim).eq('module_id', modId).single();
                    if (data && data.completed_steps) {
                        data.completed_steps.forEach(idx => {
                            const cb = document.querySelector(`.step-check[data-idx="${idx}"]`);
                            if (cb) cb.checked = true;
                        });
                        checkAllSteps(); // Updates button state
                    }
                }

                // Check UI State
                window.checkAllSteps = () => {
                    const checks = document.querySelectorAll('.step-check:not(:checked)');
                    const total = document.querySelectorAll('.step-check').length;
                    const done = total - checks.length;

                    const btn = document.getElementById('complete-btn');
                    if (checks.length === 0) {
                        btn.disabled = false;
                        btn.className = 'w-full py-4 mt-6 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-500/20 transition-all';
                        btn.innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i>  Selesaikan Modul & Tugas';
                    } else {
                        btn.disabled = true;
                        btn.className = 'w-full py-4 mt-6 bg-slate-200 text-slate-400 rounded-2xl font-bold cursor-not-allowed transition-all';
                        btn.innerHTML = `<i class="fa-solid fa-lock mr-2"></i> Selesaikan ${checks.length} Langkah Lagi`;
                    }
                };

                // --- PDF EMBED LOGIC ---
                async function renderEmbeddedPDF(url, canvasId, controlId, startPage, endPage) {
                    const canvas = document.getElementById(canvasId);
                    const loader = document.getElementById(canvasId + '-loader');
                    const controls = document.getElementById(controlId);
                    if (!canvas) return;

                    const ctx = canvas.getContext('2d');
                    let pdfDoc = null;
                    let pageNum = startPage || 1;
                    let pageRendering = false;
                    let pageNumPending = null;
                    const scale = 1.5; // High quality

                    try {
                        const loadingTask = pdfjsLib.getDocument(url);
                        pdfDoc = await loadingTask.promise;

                        const maxPage = endPage ? Math.min(endPage, pdfDoc.numPages) : pdfDoc.numPages;
                        const minPage = startPage || 1;

                        // Update Total Page UI
                        controls.querySelector('.total-page').textContent = maxPage;

                        // Render Page Function
                        const renderPage = async (num) => {
                            pageRendering = true;
                            // Update UI State
                            controls.querySelector('.curr-page').textContent = num;
                            controls.querySelector('.prev-btn').disabled = num <= minPage;
                            controls.querySelector('.next-btn').disabled = num >= maxPage;

                            const page = await pdfDoc.getPage(num);

                            // Responsive Scale
                            const viewport = page.getViewport({ scale: scale });
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;

                            // Responsive visual scale (CSS) handled by max-w-full

                            const renderContext = {
                                canvasContext: ctx,
                                viewport: viewport
                            };

                            const renderTask = page.render(renderContext);

                            // Wait for render to finish
                            await renderTask.promise;
                            pageRendering = false;

                            // Hide Loader
                            if (loader) loader.classList.add('hidden');

                            if (pageNumPending !== null) {
                                renderPage(pageNumPending);
                                pageNumPending = null;
                            }
                        };

                        // Queue Render
                        const queueRenderPage = (num) => {
                            if (pageRendering) {
                                pageNumPending = num;
                            } else {
                                renderPage(num);
                            }
                        };

                        // Initial Render
                        renderPage(pageNum);

                        // Event Listeners
                        controls.querySelector('.prev-btn').onclick = () => {
                            if (pageNum <= minPage) return;
                            pageNum--;
                            queueRenderPage(pageNum);
                        };
                        controls.querySelector('.next-btn').onclick = () => {
                            if (pageNum >= maxPage) return;
                            pageNum++;
                            queueRenderPage(pageNum);
                        };

                    } catch (e) {
                        console.error("PDF Load Error:", e);
                        if (loader) {
                            loader.innerHTML = `<div class="text-red-500 font-bold p-4 text-center">Gagal memuat dokumen.<br><span class="text-xs font-normal text-slate-500">${e.message}</span></div>`;
                        }
                    }
                }

                // Helper: Get YT ID (Legacy check)
                const getYouTubeId = (url) => { if (!url) return null; const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (m && m[2].length === 11) ? m[2] : url; };

                // VIDEO
                if (modul.video_url) {
                    const vidSec = document.getElementById('video-section');
                    const ytId = getYouTubeId(modul.video_url);
                    // Check if it's likely an ID or URL. If length is small (11 chars), likely ID.
                    const finalEmbed = ytId.length === 11 ? `https://www.youtube.com/embed/${ytId}` : modul.video_url;

                    vidSec.classList.remove('hidden');
                    vidSec.innerHTML = `
                         <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                             <i class="fa-brands fa-youtube text-red-500"></i> Video Pembelajaran
                         </h3>
                         <div class="aspect-video bg-slate-900 rounded-2xl overflow-hidden shadow-lg">
                             <iframe class="w-full h-full" src="${finalEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                         </div>
                    `;
                }

                // RESOURCES (FILE)
                // If file_url exists, show it. Otherwise show default book or nothing.
                const resContainer = document.querySelector('.bg-white.p-6.rounded-3xl.shadow-sm.border.border-slate-100 .space-y-3');
                if (modul.file_url) {
                    resContainer.innerHTML = `
                        <a href="${modul.file_url}" target="_blank"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white hover:shadow-md transition-all group">
                            <div class="w-10 h-10 bg-red-100 text-red-500 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-file-pdf"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-slate-700 text-sm">Materi Minggu ${modul.week} (PDF)</h4>
                                <p class="text-xs text-slate-400">Klik untuk melihat/download</p>
                            </div>
                            <i class="fa-solid fa-download text-slate-300 group-hover:text-primary-500"></i>
                        </a>
                     `;
                }
                // We can append the textbook link permanently if desired, but user likely wants SPECIFIC module file 1st.
                resContainer.innerHTML += `
                     <a href="buku.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white border border-dashed border-slate-200 hover:border-primary-500 transition-colors mt-2">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                             <i class="fa-solid fa-book"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-500">Buku Referensi Utama</span>
                     </a>
                `;

                // MathJax
                if (window.MathJax) MathJax.typesetPromise();

                // Check Prev/Next
                // Check Prev/Next (Removed)
            } else {
                document.querySelector('main').innerHTML = '<div class="text-center p-10 text-red-500">Materi tidak ditemukan.</div>';
            }
        }

        // Siblings check function removed

        async function completeModule(moduleId, user) {
            if (!user) { await VisualModal.alert('Silakan login terlebih dahulu.', 'Akses Ditolak', 'error'); return; }
            if (!await VisualModal.confirm('Apakah anda sudah mempelajari semua materi? Tugas terkait akan otomatis ditandai selesai.', 'Konfirmasi Selesai')) return;

            try {
                // 1. Mark Module Progress
                await supabaseClient.from('module_progress').upsert({
                    student_nim: user.nim,
                    module_id: moduleId,
                    is_completed: true,
                    completed_at: new Date().toISOString()
                }, { onConflict: 'student_nim, module_id' });

                // 2. Find Linked Assignment
                const { data: task } = await supabaseClient.from('assignments').select('id').eq('module_id', moduleId).eq('is_active', true).single();

                // PLAY SUCCESS SOUND
                if (window.SFX) window.SFX.play('success');

                if (task) {
                    // 3. Submit Task (Auto)
                    await supabaseClient.from('assignment_submissions').upsert({
                        student_nim: user.nim,
                        assignment_id: task.id,
                        checked: true,
                        score: 100,
                        submitted_at: new Date().toISOString()
                    }, { onConflict: 'student_nim, assignment_id' });

                    await VisualModal.alert('Selamat! Modul diselesaikan. Tugas terkait telah otomatis dikumpulkan', 'Luar Biasa!', 'success');
                } else {
                    await VisualModal.alert('Modul diselesaikan. (Tidak ada tugas terkait)', 'Sukses', 'success');
                }

                window.location.href = 'index.html';
            } catch (e) {
                console.error(e);
                VisualModal.alert('Gagal menyimpan progress: ' + e.message, 'Error', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadDetail();

            // Fake Loading Logic
            setTimeout(() => {
                const loader = document.getElementById('fake-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 500);
                }
            }, 5000); // 2.5 seconds delay
        });
    </script>
</body>

</html>
