<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Materi | FisikaLab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex items-center gap-4">
        <a href="modul.html"
            class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-slate-200 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="text-xl font-bold text-slate-900 truncate" id="m-title">Memuat Materi...</h1>
    </div>

    <!-- Content -->
    <main class="px-4 py-6 max-w-3xl mx-auto space-y-6">

        <!-- Hero Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 opacity-10 rounded-full blur-2xl -mr-10 -mt-10">
            </div>

            <span id="m-week"
                class="inline-block px-3 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-bold mb-4">Minggu
                --</span>
            <h2 id="m-topic" class="text-2xl font-black text-slate-900 mb-2">--</h2>
            <div id="m-desc" class="prose prose-slate prose-sm max-w-none text-slate-600">
                <!-- Markdown Content -->
            </div>
        </div>

        <!-- Video Section (Placeholder / If Exists) -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hidden" id="video-section">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-brands fa-youtube text-red-500"></i> Video Pembelajaran
            </h3>
            <div class="aspect-video bg-slate-100 rounded-2xl overflow-hidden flex items-center justify-center">
                <i class="fa-solid fa-play-circle text-6xl text-slate-300"></i>
            </div>
        </div>

        <!-- Resources (Removed) -->

        <!-- Navigation Buttons -->
        <div class="flex justify-between items-center pt-6">
            <button id="prev-modul"
                class="px-6 py-3 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold text-sm hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-arrow-left mr-2"></i> Sebelumnya
            </button>
            <button id="next-modul"
                class="px-6 py-3 rounded-xl bg-primary-600 text-white font-bold text-sm shadow-lg shadow-blue-500/30 hover:bg-primary-500 disabled:opacity-50 disabled:cursor-not-allowed">
                Selanjutnya <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function loadDetail() {
            if (!id || !window.supabaseClient) return;

            // Fetch Current Module
            const { data: modul } = await supabaseClient.from('modules').select('*').eq('id', id).single();
            const user = checkAuth(); // Need user for progress

            if (modul) {
                document.title = `${modul.topic} | FisikaLab`;
                document.getElementById('m-title').innerText = modul.topic;
                document.getElementById('m-topic').innerText = modul.topic;
                document.getElementById('m-week').innerText = `Minggu ${modul.week}`;
                document.getElementById('m-desc').innerHTML = marked.parse(modul.description || '');

                const vidSec = document.getElementById('video-section');

                // --- RENDER STEPS (JSON) ---
                // --- RENDER STEPS (JSON) ---
                const stepsContainer = document.createElement('div');
                stepsContainer.className = 'space-y-8 mb-8';

                if (modul.steps && Array.isArray(modul.steps) && modul.steps.length > 0) {
                    // Remove legacy video section if steps exist (to avoid duplicate/confusion)
                    if (vidSec) vidSec.remove();

                    // Insert AFTER the Hero Card (Topic/Description)
                    const heroCard = document.querySelector('.bg-white.p-6.rounded-3xl.shadow-sm.border.border-slate-100.relative');
                    heroCard.insertAdjacentElement('afterend', stepsContainer);

                    stepsContainer.innerHTML = '<h3 class="font-bold text-slate-800 text-lg mb-4">Langkah Pembelajaran</h3>';

                    modul.steps.forEach((step, idx) => {
                        let contentHtml = '';

                        // 1. PDF / PPT (Embedded Viewer)
                        if (['pdf', 'ppt'].includes(step.type)) {
                            const params = new URLSearchParams();
                            params.set('file', step.url);
                            params.set('embed', 'true');
                            if (step.start_page) params.set('start', step.start_page);
                            if (step.end_page) params.set('end', step.end_page);

                            contentHtml = `
                                <div class="w-full h-[500px] bg-slate-100 rounded-xl overflow-hidden border border-slate-200 mt-2 relative group-focus-within:ring-2 ring-primary-500/20">
                                    <iframe src="viewer.html?${params.toString()}" class="w-full h-full" frameborder="0"></iframe>
                                </div>
                             `;
                        } else if (step.type === 'video') {
                            // 2. Video (YouTube Embed)
                            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                            const match = step.url.match(regExp);
                            const ytId = (match && match[2].length === 11) ? match[2] : null;
                            const embedUrl = ytId ? `https://www.youtube.com/embed/${ytId}` : step.url;

                            contentHtml = `
                                <div class="aspect-video bg-slate-900 rounded-xl overflow-hidden shadow-lg mt-2">
                                     <iframe class="w-full h-full" src="${embedUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>
                             `;
                        } else {
                            // 3. Link / Other
                            contentHtml = `
                                <div class="mt-2 text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center gap-3">
                                    <i class="fa-solid fa-link text-slate-400"></i>
                                    <a href="${step.url}" target="_blank" class="text-blue-600 hover:underline break-all">${step.url}</a>
                                </div>
                             `;
                        }

                        // Wrapper Card
                        const wrapper = `
                           <div class="step-card bg-white p-6 rounded-3xl shadow-sm border border-slate-100 relative">
                               <div class="flex justify-between items-start gap-4 mb-2">
                                   <div class="flex items-center gap-3">
                                       <span class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-bold flex items-center justify-center text-sm border border-slate-200">${idx + 1}</span>
                                       <div>
                                           <h4 class="font-bold text-slate-800">${step.title}</h4>
                                           <div class="flex gap-2 text-xs">
                                              <span class="uppercase text-slate-400 font-bold tracking-wider">${step.type}</span>
                                              ${step.start_page ? `<span class="bg-indigo-50 text-indigo-600 px-1.5 rounded font-mono">Halaman ${step.start_page}-${step.end_page || 'End'}</span>` : ''}
                                           </div>
                                       </div>
                                   </div>
                                    <label class="flex items-center gap-3 cursor-pointer select-none">
                                        <input type="checkbox" class="step-check w-5 h-5 text-emerald-500 rounded focus:ring-emerald-500 cursor-pointer" onchange="checkAllSteps()">
                                        <span class="text-sm font-bold text-slate-500">Selesai</span>
                                    </label>
                               </div>
                               ${contentHtml}
                               ${step.question ? `
                                   <div class="mt-4 pt-4 border-t border-slate-100">
                                       <p class="text-sm font-bold text-slate-700 mb-2"><i class="fa-solid fa-circle-question text-primary-500 mr-2"></i>Kuis: ${step.question}</p>
                                       <div class="flex gap-2">
                                           <input type="text" placeholder="Jawaban Anda..." class="quiz-input w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                                           <button onclick="checkQuiz(this, '${step.answer_key}')" class="bg-primary-600 text-white px-4 py-2 rounded-lg text-xs font-bold">Cek</button>
                                       </div>
                                   </div>
                               ` : ''}
                           </div>
                        `;
                        stepsContainer.innerHTML += wrapper;
                    });
                }

                // --- PROGRESS ACTION ---
                const actionBtn = document.createElement('button');
                actionBtn.id = 'complete-btn';
                actionBtn.className = 'w-full py-4 mt-6 bg-slate-200 text-slate-400 rounded-2xl font-bold cursor-not-allowed transition-all';
                actionBtn.disabled = true;
                actionBtn.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> Selesaikan Semua Langkah Dulu';
                actionBtn.onclick = () => completeModule(modul.id, user);
                document.querySelector('main').appendChild(actionBtn);

                // Initial Check
                window.checkAllSteps = () => {
                    const checks = document.querySelectorAll('.step-check:not(:checked)');
                    const btn = document.getElementById('complete-btn');
                    if (checks.length === 0) {
                        btn.disabled = false;
                        btn.className = 'w-full py-4 mt-6 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-500/20 transition-all';
                        btn.innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i>  Selesaikan Modul & Tugas';
                    } else {
                        btn.disabled = true;
                        btn.className = 'w-full py-4 mt-6 bg-slate-200 text-slate-400 rounded-2xl font-bold cursor-not-allowed transition-all';
                        btn.innerHTML = `<i class="fa-solid fa-lock mr-2"></i> Selesaikan ${checks.length} Langkah Lagi`;
                    }
                };

                /* Helper: Get YT ID */
                const getYouTubeId = (url) => { if (!url) return null; const m = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/); return (m && m[2].length === 11) ? m[2] : url; };

                // VIDEO
                if (modul.video_url) {
                    const vidSec = document.getElementById('video-section');
                    const ytId = getYouTubeId(modul.video_url);
                    // Check if it's likely an ID or URL. If length is small (11 chars), likely ID.
                    const finalEmbed = ytId.length === 11 ? `https://www.youtube.com/embed/${ytId}` : modul.video_url;

                    vidSec.classList.remove('hidden');
                    vidSec.innerHTML = `
                         <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                             <i class="fa-brands fa-youtube text-red-500"></i> Video Pembelajaran
                         </h3>
                         <div class="aspect-video bg-slate-900 rounded-2xl overflow-hidden shadow-lg">
                             <iframe class="w-full h-full" src="${finalEmbed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                         </div>
                    `;
                }

                // RESOURCES (FILE)
                // If file_url exists, show it. Otherwise show default book or nothing.
                const resContainer = document.querySelector('.bg-white.p-6.rounded-3xl.shadow-sm.border.border-slate-100 .space-y-3');
                if (modul.file_url) {
                    resContainer.innerHTML = `
                        <a href="${modul.file_url}" target="_blank"
                            class="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:bg-white hover:shadow-md transition-all group">
                            <div class="w-10 h-10 bg-red-100 text-red-500 rounded-xl flex items-center justify-center text-xl group-hover:scale-110 transition-transform">
                                <i class="fa-solid fa-file-pdf"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-slate-700 text-sm">Materi Minggu ${modul.week} (PDF)</h4>
                                <p class="text-xs text-slate-400">Klik untuk melihat/download</p>
                            </div>
                            <i class="fa-solid fa-download text-slate-300 group-hover:text-primary-500"></i>
                        </a>
                     `;
                }
                // We can append the textbook link permanently if desired, but user likely wants SPECIFIC module file 1st.
                resContainer.innerHTML += `
                     <a href="buku.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white border border-dashed border-slate-200 hover:border-primary-500 transition-colors mt-2">
                        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">
                             <i class="fa-solid fa-book"></i>
                        </div>
                        <span class="text-xs font-bold text-slate-500">Buku Referensi Utama</span>
                     </a>
                `;

                // MathJax
                if (window.MathJax) MathJax.typesetPromise();

                // Check Prev/Next
                checkSiblings(modul.week);
            } else {
                document.querySelector('main').innerHTML = '<div class="text-center p-10 text-red-500">Materi tidak ditemukan.</div>';
            }
        }

        async function checkSiblings(currentWeek) {
            const { data: next } = await supabaseClient.from('modules').select('id').gt('week', currentWeek).order('week').limit(1).single();
            const { data: prev } = await supabaseClient.from('modules').select('id').lt('week', currentWeek).order('week', { ascending: false }).limit(1).single();

            const nextBtn = document.getElementById('next-modul');
            const prevBtn = document.getElementById('prev-modul');

            if (next) nextBtn.onclick = () => window.location.href = `detail_modul.html?id=${next.id}`;
            else nextBtn.disabled = true;

            if (prev) prevBtn.onclick = () => window.location.href = `detail_modul.html?id=${prev.id}`;
            else prevBtn.disabled = true;
        }

        async function completeModule(moduleId, user) {
            if (!user) { alert('Silakan login terlebih dahulu.'); return; }
            if (!confirm('Apakah anda sudah mempelajari semua materi? Tugas terkait akan otomatis ditandai selesai.')) return;

            try {
                // 1. Mark Module Progress
                await supabaseClient.from('module_progress').upsert({
                    student_nim: user.nim,
                    module_id: moduleId,
                    is_completed: true,
                    completed_at: new Date().toISOString()
                }, { onConflict: 'student_nim, module_id' });

                // 2. Find Linked Assignment
                const { data: task } = await supabaseClient.from('assignments').select('id').eq('module_id', moduleId).eq('is_active', true).single();

                if (task) {
                    // 3. Submit Task (Auto)
                    await supabaseClient.from('assignment_submissions').upsert({
                        student_nim: user.nim,
                        assignment_id: task.id,
                        checked: true,
                        score: 100,
                        submitted_at: new Date().toISOString()
                    }, { onConflict: 'student_nim, assignment_id' });

                    alert('Selamat! Modul diselesaikan. Tugas terkait telah otomatis dikumpulkan (Nilai 100).');
                } else {
                    alert('Modul diselesaikan. (Tidak ada tugas terkait)');
                }

                window.location.href = 'index.html';
            } catch (e) {
                console.error(e);
                alert('Gagal menyimpan progress: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', loadDetail);
    </script>
</body>

</html>
