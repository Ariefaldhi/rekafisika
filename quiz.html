<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Random Quiz | KawanFismat</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Confetti for Win -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a' }, accent: { 500: '#06b6d4' } },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-abstract {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-abstract text-slate-100 font-inter min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="p-6 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
            <i class="fa-solid fa-chevron-left text-slate-400"></i>
            <span class="font-bold text-lg text-white">Keluar Quiz</span>
        </a>
        <div class="px-4 py-1 rounded-full bg-slate-800 border border-slate-700 font-mono text-sm">
            Skor: <span id="score" class="text-accent-500 font-bold">0</span>/5
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">

        <!-- Start Screen -->
        <div id="start-screen" class="glass-card max-w-md w-full p-8 rounded-2xl text-center space-y-6">
            <div
                class="w-24 h-24 bg-pink-500/20 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce-slow">
                <i class="fa-solid fa-brain text-5xl text-pink-500"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-indigo-400">
                AI Random Quiz
            </h1>
            <p class="text-slate-400">
                Tantang diri lo! AI bakal buatin 5 soal acak dari materi Fisika Matematika (Boas). Siap gak?
            </p>
            <button onclick="startQuiz()"
                class="w-full py-3 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95">
                Mulai Quiz <i class="fa-solid fa-rocket ml-2"></i>
            </button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="hidden text-center space-y-4">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-accent-500"></i>
            <div class="space-y-2">
                <h3 class="text-xl font-bold font-mono">Sedang Meracik Soal...</h3>
                <p class="text-slate-400 text-sm" id="loading-text">Menghubungi Professor AI...</p>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden w-full max-w-2xl">
            <!-- Progress Bar -->
            <div class="w-full bg-slate-800 h-2 rounded-full mb-6 overflow-hidden">
                <div id="progress-bar" class="h-full bg-accent-500 transition-all duration-500 w-0"></div>
            </div>

            <!-- Question Card -->
            <div class="glass-card p-6 md:p-8 rounded-2xl relative overflow-hidden">
                <span
                    class="absolute top-4 right-4 text-xs font-bold text-slate-500 border border-slate-700 px-2 py-1 rounded">
                    Soal <span id="q-number">1</span>/5
                </span>

                <h2 id="q-text" class="text-xl md:text-2xl font-bold mb-8 mt-2 leading-relaxed">
                    <!-- Question Text Here -->
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Options buttons will be injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback-area"
                    class="hidden mt-6 p-4 rounded-xl bg-slate-800/50 border border-slate-700 animate-fade-in">
                    <div class="flex items-start gap-3">
                        <div id="feedback-icon" class="text-2xl mt-1"></div>
                        <div>
                            <h4 id="feedback-title" class="font-bold text-lg"></h4>
                            <p id="feedback-desc" class="text-slate-300 text-sm mt-1"></p>
                        </div>
                    </div>
                    <button onclick="nextQuestion()"
                        class="mt-4 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold transition-colors">
                        Lanjut <i class="fa-solid fa-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center glass-card max-w-md w-full p-8 rounded-2xl space-y-6">
            <div id="result-icon" class="w-24 h-24 mx-auto rounded-full flex items-center justify-center text-4xl mb-4">
            </div>

            <h2 class="text-2xl font-bold">Quiz Selesai!</h2>
            <div class="py-4">
                <p class="text-slate-400 text-sm uppercase tracking-widest mb-1">SKOR AKHIR</p>
                <div class="text-6xl font-black text-white" id="final-score">0</div>
            </div>

            <p id="result-msg" class="text-lg text-slate-300"></p>

            <div class="grid grid-cols-2 gap-3 pt-4">
                <button onclick="location.reload()"
                    class="py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-colors">
                    Main Lagi
                </button>
                <a href="buku.html"
                    class="py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-colors">
                    Belajar Dulu
                </a>
            </div>
        </div>

    </main>

    <!-- Logic -->
    <script src="config.js"></script>
    <script>
        // State
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let isAnswered = false;

        // Elements
        const screens = {
            start: document.getElementById('start-screen'),
            loading: document.getElementById('loading-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };

        async function startQuiz() {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes("PASTE_")) {
                alert("Waduh! API Key belum disetting di config.js");
                return;
            }

            switchScreen('loading');

            // Loading messages rotation
            const msgs = ["Membolak-balik buku Boas...", "Mencari soal yang menantang...", "Menyiapkan kunci jawaban..."];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                document.getElementById('loading-text').innerText = msgs[msgIdx++ % msgs.length];
            }, 1000);

            try {
                // Generate Questions via Groq
                questions = await generateQuestions();
                clearInterval(msgInterval);

                if (questions.length > 0) {
                    currentQIndex = 0;
                    score = 0;
                    document.getElementById('score').innerText = 0;
                    showQuestion();
                    switchScreen('quiz');
                } else {
                    throw new Error("Gagal generate soal.");
                }
            } catch (err) {
                clearInterval(msgInterval);
                alert("Error: " + err.message);
                location.reload();
            }
        }

        async function generateQuestions() {
            const prompt = `Buatlah 5 soal pilihan ganda (Multiple Choice) tentang Fisika Matematika (Buku Mary L. Boas).
            Topik bisa mencakup: Deret, Bilangan Kompleks, Matriks, Vektor, PDB, dll.
            Berikan output HANYA dalam format JSON Array murni tanpa markdown.
            Format JSON:
            [
                {
                    "q": "Pertanyaan soal...",
                    "opts": ["Pilihan A", "Pilihan B", "Pilihan C", "Pilihan D"],
                    "a": 0, // Index jawaban benar (0-3)
                    "expl": "Penjelasan singkat kenapa jawaban itu benar."
                }
            ]
            Pastikan soal variatif dan menantang tapi bisa dikerjakan tanpa kalkulator.`;

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are a quiz generator that outputs strict JSON." },
                        { role: "user", content: prompt }
                    ],
                    model: "llama-3.3-70b-versatile",
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const content = data.choices[0].message.content;

            // Clean markdown tags if any
            const jsonStr = content.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(jsonStr);
        }

        function showQuestion() {
            const q = questions[currentQIndex];
            isAnswered = false;

            // Update UI
            document.getElementById('q-number').innerText = currentQIndex + 1;
            document.getElementById('q-text').innerText = q.q;

            // Progress Bar
            const percent = ((currentQIndex) / 5) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            // Render Options
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';
            document.getElementById('feedback-area').classList.add('hidden');

            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border border-slate-700 bg-slate-800/50 hover:bg-slate-700 hover:border-slate-500 transition-all font-medium group flex items-center gap-3`;
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-sm font-bold group-hover:bg-slate-600 transition-colors">${String.fromCharCode(65 + idx)}</span>
                    <span class="flex-grow">${opt}</span>
                `;
                btn.onclick = () => checkAnswer(idx, btn);
                optsContainer.appendChild(btn);
            });

            // Re-render math
            if (window.MathJax) MathJax.typesetPromise();
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered) return;
            isAnswered = true;

            const q = questions[currentQIndex];
            const isCorrect = selectedIndex === q.a;

            // Style logic
            const allBtns = document.getElementById('options-container').children;

            // Highlight Correct Answer
            allBtns[q.a].classList.remove('bg-slate-800/50', 'border-slate-700');
            allBtns[q.a].classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-300');

            if (isCorrect) {
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
                score += 20; // 5 soal x 20 = 100
                document.getElementById('score').innerText = score;
                showFeedback(true, q.expl);
            } else {
                btnElement.classList.remove('bg-slate-800/50', 'border-slate-700');
                btnElement.classList.add('bg-red-500/20', 'border-red-500', 'text-red-300');
                showFeedback(false, q.expl);
            }
        }

        function showFeedback(isCorrect, explanation) {
            const area = document.getElementById('feedback-area');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');

            area.classList.remove('hidden');
            if (isCorrect) {
                area.className = "mt-6 p-4 rounded-xl bg-emerald-900/20 border border-emerald-500/30";
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
                title.innerText = "Benar! Mantap 🔥";
                title.className = "font-bold text-lg text-emerald-400";
            } else {
                area.className = "mt-6 p-4 rounded-xl bg-red-900/20 border border-red-500/30";
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                title.innerText = "Yah, Kurang Tepat 😅";
                title.className = "font-bold text-lg text-red-400";
            }
            desc.innerText = explanation;
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < 5) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            switchScreen('result');
            document.getElementById('final-score').innerText = score;
            const msg = document.getElementById('result-msg');
            const icon = document.getElementById('result-icon');

            if (score === 100) {
                icon.className += " bg-emerald-500/20 text-emerald-500";
                icon.innerHTML = '<i class="fa-solid fa-trophy"></i>';
                msg.innerText = "Gokil! Perfect Score! Lo emang sepuh FisMat! 👑";
                confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
            } else if (score >= 60) {
                icon.className += " bg-blue-500/20 text-blue-500";
                icon.innerHTML = '<i class="fa-solid fa-thumbs-up"></i>';
                msg.innerText = "Not bad! Lumayan paham lah ya. 👍";
            } else {
                icon.className += " bg-red-500/20 text-red-500";
                icon.innerHTML = '<i class="fa-solid fa-book-open"></i>';
                msg.innerText = "Waduh, mending baca buku lagi deh bestie. 😅";
            }
        }

        function switchScreen(id) {
            Object.values(screens).forEach(el => el.classList.add('hidden'));
            screens[id].classList.remove('hidden');
        }

    </script>
</body>

</html>
