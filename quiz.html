<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Random Quiz | KawanFismat</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Confetti for Win -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a' }, accent: { 500: '#06b6d4' } },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-abstract {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-abstract text-slate-100 font-inter min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="p-4 md:p-6 flex items-center justify-between relative z-10">
        <a href="index.html"
            class="flex items-center gap-2 hover:opacity-80 transition-opacity bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700 backdrop-blur-sm">
            <i class="fa-solid fa-chevron-left text-slate-400"></i>
            <span class="font-bold text-sm md:text-base text-white">Keluar</span>
        </a>

        <div class="flex items-center gap-3">
            <button onclick="toggleMute()" id="btn-mute"
                class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-volume-high"></i>
            </button>
            <div
                class="px-4 py-2 rounded-full bg-slate-800 border border-slate-700 font-mono text-sm flex items-center gap-2 shadow-lg">
                <i class="fa-solid fa-fire text-orange-500 animate-pulse"></i>
                <span id="streak-display" class="font-bold text-orange-400">0</span>
            </div>
            <div class="px-4 py-2 rounded-full bg-indigo-900/50 border border-indigo-500/30 font-mono text-sm">
                Skor: <span id="score" class="text-indigo-400 font-bold">0</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4 relative z-0">

        <!-- Start Screen -->
        <div id="start-screen"
            class="glass-card max-w-md w-full p-8 rounded-2xl text-center space-y-6 relative overflow-hidden">
            <!-- Decor -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>

            <div
                class="w-24 h-24 bg-gradient-to-br from-pink-500/20 to-purple-600/20 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce-slow border border-white/10 shadow-[0_0_30px_rgba(236,72,153,0.3)]">
                <i class="fa-solid fa-gamepad text-5xl text-pink-500"></i>
            </div>
            <h1
                class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400">
                Fismat Arcade
            </h1>
            <p class="text-slate-400 leading-relaxed">
                Mode Seru! Jawab cepat, jaga <b>Streak</b>, dan kumpulkan skor tertinggi! <br>
                <span class="text-xs font-mono text-slate-500 mt-2 block bg-slate-900/50 p-2 rounded">Topik: Konsep
                    Fisika & Matematika Teknik</span>
            </p>
            <button onclick="startQuiz()"
                class="w-full py-4 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold rounded-xl shadow-[0_10px_20px_rgba(219,39,119,0.3)] transition-all hover:scale-105 active:scale-95 group">
                Mulai Challenge <i class="fa-solid fa-bolt ml-2 group-hover:animate-ping"></i>
            </button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="hidden text-center space-y-6">
            <div class="relative w-24 h-24 mx-auto">
                <div class="absolute inset-0 border-4 border-slate-700/50 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-pink-500 rounded-full animate-spin"></div>
                <i
                    class="fa-solid fa-robot absolute inset-0 flex items-center justify-center text-3xl text-slate-500"></i>
            </div>
            <div class="space-y-2">
                <h3 class="text-xl font-bold font-mono text-white">GENERATING LEVEL...</h3>
                <p class="text-slate-400 text-sm animate-pulse" id="loading-text">Menghubungi Professor AI...</p>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden w-full max-w-2xl relative">

            <!-- Turn Timer -->
            <div class="absolute -top-12 left-0 w-full flex items-center justify-between px-2">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Time Left</div>
                <div class="text-xl font-mono font-bold text-white flex items-center gap-2">
                    <i class="fa-regular fa-clock"></i> <span id="timer-display">30</span>s
                </div>
            </div>

            <!-- Timer Bar -->
            <div
                class="relative w-full bg-slate-800 h-3 rounded-full mb-6 overflow-hidden border border-slate-700 shadow-inner">
                <div id="timer-bar"
                    class="h-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-1000 w-full ease-linear">
                </div>
            </div>

            <!-- Question Card -->
            <div class="glass-card p-6 md:p-8 rounded-2xl relative overflow-hidden ring-1 ring-white/10 shadow-2xl">
                <span
                    class="absolute top-4 right-4 text-xs font-bold text-slate-500 border border-slate-700 px-2 py-1 rounded">
                    Soal <span id="q-number">1</span>/5
                </span>

                <h2 id="q-text" class="text-xl md:text-2xl font-bold mb-8 mt-2 leading-relaxed">
                    <!-- Question Text Here -->
                </h2>

                <div id="options-container" class="space-y-3">
                    <!-- Options buttons will be injected here -->
                </div>

                <!-- Feedback Area -->
                <div id="feedback-area"
                    class="hidden mt-6 p-4 rounded-xl bg-slate-800/50 border border-slate-700 animate-fade-in">
                    <div class="flex items-start gap-3">
                        <div id="feedback-icon" class="text-2xl mt-1"></div>
                        <div>
                            <h4 id="feedback-title" class="font-bold text-lg"></h4>
                            <p id="feedback-desc" class="text-slate-300 text-sm mt-1"></p>
                        </div>
                    </div>
                    <button onclick="nextQuestion()"
                        class="mt-4 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold transition-colors">
                        Lanjut <i class="fa-solid fa-arrow-right ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center glass-card max-w-md w-full p-8 rounded-2xl space-y-6">
            <div id="result-icon" class="w-24 h-24 mx-auto rounded-full flex items-center justify-center text-4xl mb-4">
            </div>

            <h2 class="text-2xl font-bold">Quiz Selesai!</h2>
            <div class="py-4">
                <p class="text-slate-400 text-sm uppercase tracking-widest mb-1">SKOR AKHIR</p>
                <div class="text-6xl font-black text-white" id="final-score">0</div>
            </div>

            <p id="result-msg" class="text-lg text-slate-300"></p>

            <div class="grid grid-cols-2 gap-3 pt-4">
                <button onclick="location.reload()"
                    class="py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-colors">
                    Main Lagi
                </button>
                <a href="buku.html"
                    class="py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-colors">
                    Belajar Dulu
                </a>
            </div>
        </div>

    </main>

    <!-- Logic -->
    <script src="config.js"></script>
    <script>
        // --- CONFIG & STATE ---
        const QUIZ_TOPIC = "Konsep Dasar Fisika Matematika, Kalkulus, dan Fisika Modern (Level Kuliah)";
        let questions = [];
        let currentQIndex = 0;
        let score = 0;
        let streak = 0;
        let isAnswered = false;
        let timerInterval;
        let timeLeft = 30;
        let isMuted = false;

        // --- AUDIO SYSTEM (Web Audio API - No Assets Needed!) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                // Ding! (coin sound)
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.setValueAtTime(1600, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                // Buzz (fail)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'start') {
                // Power up
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.5);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('btn-mute');
            btn.innerHTML = isMuted ? '<i class="fa-solid fa-volume-xmark text-red-400"></i>' : '<i class="fa-solid fa-volume-high"></i>';
        }

        // --- CORE FUNCTIONS ---
        const screens = {
            start: document.getElementById('start-screen'),
            loading: document.getElementById('loading-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };

        async function startQuiz() {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes("PASTE_")) {
                alert("Waduh! API Key belum disetting di config.js");
                return;
            }
            playSound('start');
            switchScreen('loading');

            const msgs = ["Menghubungi Nexus...", "Mengunduh Soal dari Masa Depan...", "Mengkalibrasi Tingkat Kesulitan..."];
            let msgIdx = 0;
            const msgInterval = setInterval(() => {
                document.getElementById('loading-text').innerText = msgs[msgIdx++ % msgs.length];
            }, 1000);

            try {
                questions = await generateQuestions();
                clearInterval(msgInterval);

                if (questions.length > 0) {
                    currentQIndex = 0;
                    score = 0;
                    streak = 0;
                    updateStats();
                    showQuestion();
                    switchScreen('quiz');
                } else {
                    throw new Error("Gagal generate soal.");
                }
            } catch (err) {
                clearInterval(msgInterval);
                alert("Error: " + err.message);
                location.reload();
            }
        }

        async function generateQuestions() {
            let context = "";
            try {
                // Determine reference file
                const refFile = 'matriks.pdf'; // Hardcoded for this task

                // Update Loading Text
                document.getElementById('loading-text').innerText = `Membaca ${refFile}...`;

                // Extract Text
                const pdfText = await extractPDFContent(refFile);
                if (pdfText) {
                    context = `Gunakan materi berikut sebagai referensi utama untuk membuat soal:\n\n${pdfText.substring(0, 15000)}\n\n`;
                    console.log("Context loaded from PDF length:", pdfText.length);
                }
            } catch (e) {
                console.warn("Gagal membaca PDF referensi, menggunakan topik default.", e);
            }

            const prompt = `${context}
            Buatlah 5 soal pilihan ganda Cerdas Cermat tentang topik yang ada di teks referensi di atas (Matriks & Determinan).
            Jika referensi kosong, gunakan topik: ${QUIZ_TOPIC}.
            
            Style soal: Menyenangkan, menantang logika, tidak terlalu panjang hitungannya.
            Berikan output HANYA dalam format JSON Array murni.
            Format JSON:
            [
                {
                    "q": "Pertanyaan...",
                    "opts": ["A", "B", "C", "D"],
                    "a": 0,
                    "expl": "Penjelasan singkat seru."
                }
            ]`;

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "You are a fun quiz master. Output strictly JSON." },
                        { role: "user", content: prompt }
                    ],
                    model: "llama-3.3-70b-versatile",
                    temperature: 0.7
                })
            });

            const data = await response.json();
            if (!data.choices || data.choices.length === 0) {
                throw new Error("AI tidak merespon dengan benar. Coba lagi!");
            }

            const content = data.choices[0].message.content;

            // Cleanup Markdown format if exist
            const jsonStr = content.replace(/```json/g, '').replace(/```/g, '').trim();

            try {
                return JSON.parse(jsonStr);
            } catch (e) {
                console.error("JSON Parse Error:", content);
                throw new Error("Gagal memproses soal dari AI.");
            }
        }

        async function extractPDFContent(url) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                let fullText = '';

                // Limit pages to avoid token limits (e.g., first 5-10 pages or random pages)
                const maxPages = Math.min(pdf.numPages, 10);

                for (let i = 1; i <= maxPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n';
                }
                return fullText;
            } catch (error) {
                console.error('Error extracting PDF:', error);
                return null;
            }
        }

        function showQuestion() {
            const q = questions[currentQIndex];
            isAnswered = false;

            // Reset Timer
            startTimer();

            // UI Updates
            document.getElementById('q-number').innerText = currentQIndex + 1;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feedback-area').classList.add('hidden');

            // Render Options
            const optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = '';

            const colors = ['border-pink-500/30 hover:border-pink-500 text-pink-100', 'border-purple-500/30 hover:border-purple-500 text-purple-100', 'border-indigo-500/30 hover:border-indigo-500 text-indigo-100', 'border-cyan-500/30 hover:border-cyan-500 text-cyan-100'];

            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border bg-slate-800/80 backdrop-blur-sm transition-all font-medium group flex items-center gap-4 ${colors[idx % 4]} hover:shadow-lg hover:scale-[1.01] active:scale-[0.99]`;
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center text-sm font-bold shadow-inner">${String.fromCharCode(65 + idx)}</span>
                    <span class="flex-grow text-lg shadow-black drop-shadow-md">${opt}</span>
                `;
                btn.onclick = () => { playSound('click'); checkAnswer(idx, btn); };
                optsContainer.appendChild(btn);
            });

            if (window.MathJax) MathJax.typesetPromise();
        }

        function startTimer() {
            timeLeft = 30; // 30 seconds
            clearInterval(timerInterval);
            updateTimerUI();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(-1, null); // Time's up!
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-display').innerText = timeLeft;
            const percent = (timeLeft / 30) * 100;
            const bar = document.getElementById('timer-bar');
            bar.style.width = `${percent}%`;

            // Color shift logic
            if (percent < 30) {
                bar.className = "h-full bg-red-500 transition-all duration-1000 w-full ease-linear animate-pulse";
            } else if (percent < 60) {
                bar.className = "h-full bg-yellow-500 transition-all duration-1000 w-full ease-linear";
            } else {
                bar.className = "h-full bg-gradient-to-r from-green-400 to-emerald-500 transition-all duration-1000 w-full ease-linear";
            }
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);

            const q = questions[currentQIndex];
            const isCorrect = selectedIndex === q.a;

            const allBtns = document.getElementById('options-container').children;

            // Highlight Logic
            if (selectedIndex !== -1) {
                // If user clicked something
                if (isCorrect) {
                    btnElement.classList.add('!bg-emerald-500', '!border-emerald-400', '!text-white', 'shadow-[0_0_20px_rgba(16,185,129,0.5)]');
                } else {
                    btnElement.classList.add('!bg-red-500', '!border-red-400', '!text-white');
                }
            }

            // Always show correct
            allBtns[q.a].classList.add('ring-2', 'ring-emerald-400', 'bg-emerald-500/20');

            if (isCorrect) {
                playSound('correct');
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });

                // Score calc: Base 100 + (TimeLeft * 2) + (Streak * 10)
                const timeBonus = timeLeft * 2;
                const streakBonus = streak * 10;
                const roundScore = 100 + timeBonus + streakBonus;
                score += roundScore;

                streak++;
                showFeedback(true, q.expl, roundScore);
            } else {
                playSound('wrong');
                streak = 0; // Reset streak
                showFeedback(false, q.expl, 0);
            }
            updateStats();
        }

        function showFeedback(isCorrect, explanation, gainedPoints) {
            const area = document.getElementById('feedback-area');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const desc = document.getElementById('feedback-desc');

            area.classList.remove('hidden');
            if (isCorrect) {
                area.className = "mt-6 p-4 rounded-xl bg-emulator-green border border-emerald-500/30 relative overflow-hidden";
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-400 text-3xl animate-bounce"></i>';
                title.innerHTML = `BENAR! <span class="text-sm font-normal text-emerald-300 ml-2">+${gainedPoints} pts</span>`;
                title.className = "font-black text-xl text-emerald-400 italic";
            } else {
                area.className = "mt-6 p-4 rounded-xl bg-red-900/40 border border-red-500/30";
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-3xl shake"></i>';
                title.innerText = "YAH SALAH!";
                title.className = "font-black text-xl text-red-400 italic";
            }
            desc.innerText = explanation;
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            const streakEl = document.getElementById('streak-display');
            streakEl.innerText = streak;
            streakEl.parentElement.className = streak > 2
                ? "px-4 py-2 rounded-full bg-orange-500/20 border border-orange-500 font-mono text-sm flex items-center gap-2 shadow-[0_0_15px_rgba(249,115,22,0.4)] transition-all scale-110"
                : "px-4 py-2 rounded-full bg-slate-800 border border-slate-700 font-mono text-sm flex items-center gap-2";
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < 5) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            switchScreen('result');
            document.getElementById('final-score').innerText = score;
            const msg = document.getElementById('result-msg');
            const icon = document.getElementById('result-icon');

            // Determine Rank
            let rank = "";
            let color = "";

            // Max score estimate: ~170 * 5 = 850
            if (score > 600) {
                rank = "LEGEND 🏆";
                color = "text-yellow-400";
                icon.innerHTML = '<i class="fa-solid fa-crown fa-bounce"></i>';
                msg.innerHTML = "Gila! Lo beneran sepuh Fismat! <br> Score setinggi ini jarang banget!";
                confetti({ particleCount: 500, spread: 360, startVelocity: 60 });
                playSound('correct');
            } else if (score > 300) {
                rank = "MASTER 🎓";
                color = "text-blue-400";
                icon.innerHTML = '<i class="fa-solid fa-medal"></i>';
                msg.innerHTML = "Nice game! Logika lo jalan banget. Pertahankan!";
                confetti({ particleCount: 200, spread: 120 });
            } else {
                rank = "PEJUANG 🛡️";
                color = "text-slate-400";
                icon.innerHTML = '<i class="fa-solid fa-shield-cat"></i>';
                msg.innerHTML = "Gapapa, latihan lagi ya. Jangan menyerah!";
            }

            icon.className = `w-32 h-32 mx-auto rounded-full flex items-center justify-center text-6xl mb-6 bg-slate-800 shadow-2xl ${color} border-4 border-slate-700`;
        }

        function switchScreen(id) {
            Object.values(screens).forEach(el => el.classList.add('hidden'));
            screens[id].classList.remove('hidden');
        }

    </script>
</body>

</html>
