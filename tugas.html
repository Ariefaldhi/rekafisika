<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Tugas | FisikaLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Daftar Tugas</h1>
        <p class="text-sm text-slate-500 mt-1">Selesaikan tugas sebelum tenggat waktu.</p>
    </div>

    <!-- Content -->
    <main class="px-6 py-6" id="tasks-container">
        <!-- Active Tasks -->
        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500"></span> Belum Selesai
        </h3>
        <div id="active-list" class="space-y-4 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center animate-pulse">
                <div class="h-4 bg-slate-200 rounded w-1/2 mx-auto mb-2"></div>
                <div class="h-3 bg-slate-100 rounded w-1/3 mx-auto"></div>
            </div>
        </div>

        <!-- Completed Tasks -->
        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Selesai
        </h3>
        <div id="completed-list" class="space-y-4">
            <!-- Injected -->
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="tugas.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-bold">Tugas</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="lainnya.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
            <span class="text-[10px] font-medium">Lainnya</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchTasks);

        async function fetchTasks() {
            if (!window.supabaseClient) return;
            const activeList = document.getElementById('active-list');
            const completedList = document.getElementById('completed-list');

            try {
                // Fetch assignments (Same logic, new styling)
                const { data: assignments } = await supabaseClient.from('assignments').select('*').eq('is_active', true).order('deadline', { ascending: true });

                // MOCK Data if empty for demo
                const tasks = assignments || [];

                activeList.innerHTML = '';
                completedList.innerHTML = '';

                if (tasks.length === 0) {
                    activeList.innerHTML = '<div class="text-center py-8 text-slate-400">Tidak ada tugas aktif.</div>';
                    return;
                }

                tasks.forEach(task => {
                    const isDone = false; // Add real status check logic from previous version
                    const card = `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow relative overflow-hidden group">
                           <div class="flex justify-between items-start mb-3">
                               <span class="bg-orange-50 text-orange-600 px-3 py-1 rounded-full text-xs font-bold border border-orange-100">
                                   Deadline: ${new Date(task.deadline).toLocaleDateString('id-ID')}
                               </span>
                               ${task.submission_link ? `<a href="${task.submission_link}" target="_blank" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-blue-50 hover:text-blue-600 transition-colors"><i class="fa-solid fa-link"></i></a>` : ''}
                           </div>
                           <h4 class="font-bold text-slate-800 text-lg mb-1">${task.title}</h4>
                           <p class="text-sm text-slate-500 line-clamp-2 mb-4">${task.description}</p>
                           
                           <button class="w-full py-3 rounded-xl font-bold text-sm bg-slate-900 text-white hover:bg-slate-800 transition-colors shadow-lg shadow-slate-900/10">
                               Detail Tugas
                           </button>
                        </div>
                    `;
                    activeList.innerHTML += card;
                });

            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
