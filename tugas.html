<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas | KawanFismat</title>
    <!-- Fonts, Tailwind, FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: { navy: { 900: '#0f172a' }, accent: { 400: '#22d3ee', 500: '#06b6d4' } }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-abstract {
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-abstract text-slate-100 font-inter min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-2">
                    <i class="fa-solid fa-atom text-accent-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide">KawanFismat</span>
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Beranda</a>
                        <a href="tugas.html"
                            class="text-accent-400 px-3 py-2 rounded-md text-sm font-bold bg-slate-800/50">Tugas</a>
                        <a href="presensi.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Presensi</a>
                        <a href="keaktifan.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Keaktifan</a>
                        <a href="modul.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Modul</a>
                        <a href="profil.html"
                            class="hover:text-accent-400 transition-colors px-3 py-2 rounded-md text-sm font-medium">Profil</a>
                    </div>
                </div>

                <!-- Mobile Menu Button -->
                <div class="-mr-2 flex md:hidden">
                    <button type="button" class="p-2 rounded-md text-slate-400 hover:text-white"
                        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden glass-card absolute w-full" id="mobile-menu">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="block px-3 py-2 rounded-md text-base font-medium">Beranda</a>
                <a href="tugas.html" class="text-accent-400 block px-3 py-2 rounded-md text-base font-medium">Tugas</a>
                <a href="presensi.html" class="block px-3 py-2 rounded-md text-base font-medium">Presensi</a>
                <a href="keaktifan.html" class="block px-3 py-2 rounded-md text-base font-medium">Keaktifan</a>
                <a href="modul.html" class="block px-3 py-2 rounded-md text-base font-medium">Modul</a>
                <a href="profil.html" class="block px-3 py-2 rounded-md text-base font-medium">Profil</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full flex-grow">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-bold">Daftar Tugas</h1>
            <div class="text-sm text-slate-400">Semester Genap 2026</div>
        </div>

        <!-- Task Categories -->
        <div class="space-y-12">

            <!-- 1. Active / Not Done -->
            <section>
                <h2
                    class="text-xl font-bold mb-6 text-yellow-400 flex items-center gap-3 bg-yellow-500/10 p-3 rounded-lg border border-yellow-500/20 w-fit">
                    <i class="fa-solid fa-hourglass-half"></i> Belum Selesai
                </h2>
                <div id="active-list" class="space-y-6">
                    <!-- Loading -->
                    <div class="glass-card rounded-xl p-6 animate-pulse h-40"></div>
                </div>
            </section>

            <!-- 2. Completed -->
            <section>
                <h2
                    class="text-xl font-bold mb-6 text-emerald-400 flex items-center gap-3 bg-emerald-500/10 p-3 rounded-lg border border-emerald-500/20 w-fit">
                    <i class="fa-solid fa-check-circle"></i> Sudah Selesai
                </h2>
                <div id="completed-list" class="space-y-6">
                    <!-- Loading -->
                    <div class="glass-card rounded-xl p-6 animate-pulse h-24"></div>
                </div>
            </section>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-800 bg-slate-900 text-center mt-auto">
        <p class="text-slate-400 text-sm">&copy; 2026 KawanFismat.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        async function fetchTasks() {
            const activeList = document.getElementById('active-list');
            const completedList = document.getElementById('completed-list');

            const user = checkAuth();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            if (!supabaseClient) {
                setTimeout(fetchTasks, 500);
                return;
            }

            try {
                // 1. Get All Active Assignments
                const { data: assignments, error: errAssign } = await supabaseClient
                    .from('assignments')
                    .select('*')
                    .eq('is_active', true)
                    .order('deadline', { ascending: true });

                if (errAssign) throw errAssign;

                // 2. Get Student's Status
                const { data: statusData, error: errStatus } = await supabaseClient
                    .from('student_task_status')
                    .select('assignment_id, is_completed')
                    .eq('student_id', user.nim);

                if (errStatus) throw errStatus;

                // Map Status
                const statusMap = {};
                statusData.forEach(s => statusMap[s.assignment_id] = s.is_completed);

                // Group Tasks
                let htmlActive = '';
                let htmlCompleted = '';

                if (assignments && assignments.length > 0) {
                    assignments.forEach(task => {
                        const isDone = statusMap[task.id] || false;
                        const card = createCard(task, isDone);
                        if (isDone) {
                            htmlCompleted += card;
                        } else {
                            htmlActive += card;
                        }
                    });
                }

                // Render
                activeList.innerHTML = htmlActive || '<div class="glass-card p-6 text-slate-500 italic text-center">Tidak ada tugas yang belum selesai. Kerja bagus! ✨</div>';
                completedList.innerHTML = htmlCompleted || '<div class="glass-card p-6 text-slate-500 italic text-center">Belum ada tugas yang diselesaikan.</div>';

            } catch (err) {
                console.error(err);
                activeList.innerHTML = `<p class="text-red-400">Error: ${err.message}</p>`;
            }
        }

        function createCard(task, isDone) {
            const deadline = new Date(task.deadline);
            const now = new Date();
            const diffTime = deadline - now;
            const isLinked = !!task.linked_module_id;

            // Countdown Calc
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const diffMins = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));

            // Colors
            const borderClass = isDone ? 'border-emerald-500' : 'border-yellow-500';
            let btnClass = isDone
                ? 'bg-emerald-600/20 text-emerald-400 border border-emerald-500/30'
                : 'bg-gradient-to-r from-emerald-600 to-emerald-500 text-white shadow-lg shadow-emerald-500/20';

            let btnText = isDone ? '<i class="fa-solid fa-rotate-left mr-2"></i>Batal Selesai' : '<i class="fa-solid fa-check mr-2"></i>Tandai Selesai';
            let btnAction = `toggleStatus('${task.id}', ${!isDone})`;

            // Linked Task Logic
            if (isLinked) {
                if (!isDone) {
                    btnClass = 'bg-slate-700 text-slate-400 cursor-not-allowed border border-slate-600';
                    btnText = '<i class="fa-solid fa-lock mr-2"></i>Selesaikan di Modul';
                    btnAction = "alert('Tugas ini terhubung dengan modul. Silakan selesaikan modul terkait untuk menyelesaikannya.')";
                } else {
                    btnClass = 'bg-emerald-900/30 text-emerald-500 border border-emerald-500/30 cursor-default';
                    btnText = '<i class="fa-solid fa-link mr-2"></i>Selesai via Modul';
                    btnAction = "";
                }
            }

            // Box Countdown UI (Only show for Active tasks roughly)
            let countdownUI = '';
            if (!isDone && diffTime > 0) {
                countdownUI = `
                    <div class="flex gap-2 mb-4 md:mb-0">
                        <div class="bg-slate-900/50 p-2 rounded-lg border border-slate-700/50 min-w-[60px] text-center">
                            <span class="block text-xl font-bold text-accent-400 font-mono">${diffDays}</span>
                            <span class="text-[10px] text-slate-500 uppercase">Hari</span>
                        </div>
                        <div class="bg-slate-900/50 p-2 rounded-lg border border-slate-700/50 min-w-[60px] text-center">
                            <span class="block text-xl font-bold text-accent-400 font-mono">${diffHours}</span>
                            <span class="text-[10px] text-slate-500 uppercase">Jam</span>
                        </div>
                        <div class="bg-slate-900/50 p-2 rounded-lg border border-slate-700/50 min-w-[60px] text-center">
                            <span class="block text-xl font-bold text-accent-400 font-mono">${diffMins}</span>
                            <span class="text-[10px] text-slate-500 uppercase">Mnt</span>
                        </div>
                    </div>
                `;
            } else if (diffTime < 0 && !isDone) {
                countdownUI = `<div class="bg-red-900/20 text-red-400 px-4 py-2 rounded border border-red-500/30 font-bold uppercase text-sm">Terlambat</div>`;
            }

            // Link Button
            const linkBtn = task.submission_link
                ? `<a href="${task.submission_link}" target="_blank" class="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg transition-colors border border-slate-600 font-medium flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Link Pengerjaan
                   </a>`
                : `<span class="px-5 py-2.5 bg-slate-800 text-slate-500 rounded-lg border border-slate-700 font-medium flex items-center justify-center gap-2 cursor-not-allowed">
                    <i class="fa-solid fa-link-slash"></i> No Link
                   </span>`;

            let actionButtons = '';
            if (isLinked && !isDone) {
                actionButtons = `
                    <a href="detail_modul.html?id=${task.linked_module_id}" class="px-5 py-2.5 bg-accent-600 hover:bg-accent-500 text-white rounded-lg transition-all font-medium flex items-center justify-center shadow-lg shadow-accent-500/20">
                        <i class="fa-solid fa-rocket mr-2"></i> Buka Modul
                    </a>
                `;
            } else {
                actionButtons = `
                    ${linkBtn}
                    <button onclick="${btnAction}" class="px-5 py-2.5 rounded-lg transition-all font-medium flex items-center justify-center ${btnClass}">
                        ${btnText}
                    </button>
                `;
            }

            return `
                <div class="glass-card rounded-xl p-6 border-l-4 ${borderClass} relative overflow-hidden transition-all hover:-translate-y-1 hover:shadow-lg">
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <span class="text-slate-400 text-xs flex items-center bg-slate-800/50 px-2 py-1 rounded border border-slate-700">
                                    <i class="fa-regular fa-clock mr-2"></i> ${new Date(task.deadline).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' })}
                                </span>
                                ${isLinked ? '<span class="text-accent-400 text-xs px-2 py-1 rounded bg-accent-500/10 border border-accent-500/20 font-bold"><i class="fa-solid fa-link mr-1"></i>Linked</span>' : ''}
                            </div>
                            <h3 class="text-2xl font-bold text-white mb-2">${task.title}</h3>
                            <p class="text-slate-300 text-sm leading-relaxed mb-6 max-w-2xl">${task.description}</p>
                            
                            <div class="flex flex-col sm:flex-row gap-4">
                                ${actionButtons}
                            </div>
                        </div>
                        
                        <!-- Side Info / Countdown -->
                        <div class="shrink-0 flex flex-col items-end">
                            ${countdownUI}
                        </div>
                    </div>
                </div>
            `;
        }

        async function toggleStatus(taskId, newStatus) {
            const user = checkAuth();
            if (!user) return;

            try {
                const { error } = await supabaseClient
                    .from('student_task_status')
                    .upsert({
                        student_id: user.nim,
                        assignment_id: taskId,
                        is_completed: newStatus,
                        updated_at: new Date()
                    }, { onConflict: 'student_id, assignment_id' });

                if (error) throw error;
                fetchTasks(); // Reload
            } catch (err) {
                alert('Gagal update status: ' + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchTasks);
    </script>
</body>

</html>
