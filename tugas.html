<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Tugas | FisikaLab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-enter {
            animation: slide-up 0.5s ease-out forwards;
            opacity: 0;
        }

        .delay-100 {
            animation-delay: 100ms;
        }

        .delay-200 {
            animation-delay: 200ms;
        }
    </style>
    <!-- Supabase SDK MUST load before config.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>
    <script src="config.js?v=2.5"></script>
    <script src="modal.js"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 bg-white sticky top-0 z-40 shadow-sm flex items-center justify-between animate-enter">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Daftar Tugas</h1>
            <p class="text-sm text-slate-500 mt-1">Selesaikan tugas sebelum tenggat waktu.</p>
        </div>
        <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
            <i class="fa-solid fa-clipboard-list text-lg"></i>
        </div>
    </div>

    <!-- Content -->
    <main class="px-6 py-6" id="tasks-container">
        <!-- Active Tasks -->
        <div class="animate-enter delay-100">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm uppercase tracking-wider">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span> Belum Selesai
            </h3>
            <div id="active-list" class="space-y-6 mb-8">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-center animate-pulse">
                    <div class="h-4 bg-slate-200 rounded w-1/2 mx-auto mb-2"></div>
                    <div class="h-3 bg-slate-100 rounded w-1/3 mx-auto"></div>
                </div>
            </div>
        </div>

        <!-- Completed Tasks -->
        <div class="animate-enter delay-200">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2 text-sm uppercase tracking-wider mt-8">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Selesai
            </h3>
            <div id="completed-list" class="space-y-6">
                <!-- Injected -->
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="tugas.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-solid fa-list-check text-xl"></i>
            <span class="text-[10px] font-bold">Tugas</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="lainnya.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
            <span class="text-[10px] font-medium">Lainnya</span>
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', fetchTasks);

        async function fetchTasks() {
            // Wait for Supabase (Polling logic handled in config.js)
            if (!await window.ensureSupabase()) {
                const activeList = document.getElementById('active-list');
                activeList.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fa-solid fa-cloud-bolt text-4xl mb-4 text-slate-300"></i>
                        <p class="text-slate-500">Gagal terhubung ke database.</p>
                        <button onclick="window.location.reload()" class="mt-4 px-4 py-2 bg-primary-500 text-white rounded-lg text-sm font-bold">Refresh</button>
                    </div>
                `;
                return;
            }
            const activeList = document.getElementById('active-list');
            const completedList = document.getElementById('completed-list');

            try {
                const user = checkAuth();
                if (!user) return;

                // 1. Fetch Assignments
                const { data: assignments } = await supabaseClient
                    .from('assignments')
                    .select('*')
                    .eq('is_active', true)
                    .order('deadline', { ascending: true });

                // 2. Fetch User Submissions
                const { data: submissions } = await supabaseClient
                    .from('assignment_submissions')
                    .select('assignment_id, score')
                    .eq('student_nim', user.nim);

                const submittedIds = new Set((submissions || []).map(s => s.assignment_id));
                const allTasks = assignments || [];

                activeList.innerHTML = '';
                completedList.innerHTML = '';

                let hasActive = false;
                let hasCompleted = false;

                allTasks.forEach((task, index) => {
                    const isCompleted = submittedIds.has(task.id);
                    const container = isCompleted ? completedList : activeList;

                    if (isCompleted) hasCompleted = true;
                    else hasActive = true;

                    // Detail Link
                    // const detailAction = `alert('${task.description.replace(/'/g, "\\'")}')`;
                    const detailAction = `VisualModal.alert(this.dataset.desc, 'Detail Tugas', 'info')`;

                    // Card Styling Specs
                    let badgeClass = isCompleted
                        ? "bg-emerald-100 text-emerald-600 border-emerald-200"
                        : "bg-purple-100 text-purple-600 border-purple-200";

                    let btnClass = isCompleted
                        ? "bg-emerald-50 text-emerald-600 border border-emerald-100 cursor-default"
                        : "bg-slate-900 text-white shadow-lg shadow-slate-900/20 hover:bg-slate-800";

                    let bgIcon = isCompleted ? "fa-check-circle" : "fa-clipboard-list";
                    let bgIconColor = isCompleted ? "text-emerald-500" : "text-purple-500";
                    let bgIconPos = isCompleted ? "-bottom-6 -right-6" : "-top-6 -right-6";


                    // Action Button Logic
                    let actionBtn = '';
                    if (!isCompleted) {
                        if (task.module_id) {
                            actionBtn = `
                                <button onclick="window.location.href = 'detail_modul.html?id=${task.module_id}'" 
                                    class="w-full py-3.5 rounded-2xl font-bold text-sm bg-gradient-to-r from-slate-900 to-slate-800 text-white shadow-lg shadow-slate-900/20 hover:shadow-slate-900/30 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                                    <span>Buka Modul</span> <i class="fa-solid fa-arrow-right"></i>
                                </button>`;
                        } else {
                            // Link & Mark as Done
                            let linkBtn = '';
                            if (task.submission_link) {
                                linkBtn = `
                                    <button onclick="window.open('${task.submission_link}', '_blank')" 
                                        class="flex-1 py-3.5 rounded-2xl font-bold text-sm bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100 transition-colors flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-link"></i> Link
                                    </button>`;
                            }
                            actionBtn = `
                                <div class="flex gap-3">
                                    ${linkBtn}
                                    <button onclick="markTaskManual('${task.id}')" 
                                        class="flex-[2] py-3.5 rounded-2xl font-bold text-sm bg-emerald-500 text-white shadow-lg shadow-emerald-500/30 hover:bg-emerald-600 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-check"></i> Tandai Selesai
                                    </button>
                                </div>
                            `;
                        }
                    } else {
                        actionBtn = `
                            <div class="w-full py-3 rounded-2xl font-bold text-sm bg-emerald-50 text-emerald-600 border border-emerald-100 text-center flex items-center justify-center gap-2">
                                <i class="fa-solid fa-check-circle"></i> Tugas Selesai
                            </div>`;
                    }

                    const deadlineDate = new Date(task.deadline);
                    const deadlineStr = deadlineDate.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });
                    const isUrgent = !isCompleted && (deadlineDate - new Date() < 1000 * 60 * 60 * 48); // < 48 hours

                    const card = `
                        <div class="relative bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden group hover:shadow-lg transition-all duration-300">
                             <!-- Deco Icon -->
                            <i class="fa-solid ${bgIcon} absolute ${bgIconPos} text-9xl ${bgIconColor} opacity-5 group-hover:opacity-10 transition-opacity duration-300 rotate-12"></i>
                            
                            <!-- Header -->
                            <div class="relative z-10 flex justify-between items-start mb-4">
                                <span class="px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${badgeClass}">
                                    ${isCompleted ? 'Selesai' : 'Deadline: ' + deadlineStr}
                                </span>
                                ${isUrgent ? '<span class="animate-pulse w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></span>' : ''}
                            </div>

                            <!-- Content -->
                            <div class="relative z-10 mb-6">
                                <h3 class="text-xl font-black text-slate-900 leading-tight mb-2 group-hover:text-primary-600 transition-colors">
                                    ${task.title}
                                </h3>
                                <p class="text-sm text-slate-500 leading-relaxed line-clamp-2 cursor-pointer hover:text-slate-700 transition-colors" 
                                   data-desc="${task.description.replace(/"/g, '&quot;')}" 
                                   onclick="${detailAction}">
                                    ${task.description}
                                </p>
                            </div>

                            <!-- Footer / Action -->
                            <div class="relative z-10 pt-4 border-t border-slate-50">
                                ${actionBtn}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                if (!hasActive) activeList.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-[2.5rem] border border-dashed border-slate-200">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                            <i class="fa-solid fa-clipboard-check text-2xl"></i>
                        </div>
                        <p class="text-slate-400 font-medium text-sm">Tidak ada tugas aktif.</p>
                    </div>`;

                if (!hasCompleted) completedList.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs">Belum ada tugas selesai.</div>`;

            } catch (e) { console.error(e); }
        }

        async function markTaskManual(taskId) {
            const user = checkAuth(); // Ensure verified
            if (!user) return;

            if (!await VisualModal.confirm('Apakah tugas ini sudah Anda kerjakan/kumpulkan?')) return;

            try {
                const { error } = await supabaseClient.from('assignment_submissions').upsert({
                    student_nim: user.nim,
                    assignment_id: taskId,
                    checked: false,
                    score: 0,
                    submitted_at: new Date().toISOString()
                }, { onConflict: 'student_nim, assignment_id' });

                if (error) throw error;

                await VisualModal.alert('Tugas ditandai selesai!', 'Sukses', 'success');
                fetchTasks();
            } catch (e) {
                await VisualModal.alert('Gagal: ' + e.message, 'Error', 'error');
            }
        }
    </script>
</body>

</html>
