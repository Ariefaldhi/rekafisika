<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya | FisikaLab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B', sub: '#64748B' }
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header (No Sticky, cleaner look for profile) -->
    <div class="px-6 pt-12 pb-6 bg-white shadow-sm mb-4">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Profil Saya</h1>
    </div>

    <!-- Profile Card -->
    <main class="px-6 space-y-6">

        <!-- User Info -->
        <div
            class="bg-white p-6 rounded-3xl shadow-soft border border-slate-100 flex flex-col items-center text-center">
            <div id="profile-pic"
                class="w-24 h-24 rounded-full bg-slate-100 flex items-center justify-center text-3xl font-bold text-slate-300 mb-4 border-4 border-slate-50 relative overflow-hidden">
                <i class="fa-solid fa-user"></i>
            </div>

            <h2 id="user-name" class="text-xl font-bold text-slate-900">Tamu</h2>
            <p id="user-nim" class="text-slate-400 text-sm font-mono mb-6">Belum Login</p>

            <!-- Stats Grid -->
            <div class="grid grid-cols-2 gap-3 w-full text-left">
                <!-- Kehadiran -->
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div class="flex items-center gap-3 mb-2">
                        <div
                            class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center">
                            <i class="fa-solid fa-clipboard-check"></i>
                        </div>
                        <h4 class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Kehadiran</h4>
                    </div>
                    <span class="text-2xl font-black text-slate-800" id="stat-attendance">0%</span>

                    <!-- Progress Bar -->
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden">
                        <div id="bar-attendance" class="bg-emerald-500 h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Partisipasi -->
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center">
                            <i class="fa-solid fa-hand-point-up"></i>
                        </div>
                        <h4 class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Partisipasi</h4>
                    </div>
                    <span class="text-2xl font-black text-slate-800" id="stat-participation">0</span>
                    <p class="text-[10px] text-slate-400 mt-1 leading-tight">Poin keaktifan kelas</p>
                </div>

                <!-- Tugas Selesai -->
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 rounded-lg bg-purple-100 text-purple-600 flex items-center justify-center">
                            <i class="fa-solid fa-list-check"></i>
                        </div>
                        <h4 class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Tugas</h4>
                    </div>
                    <span class="text-2xl font-black text-slate-800" id="stat-tasks">0/0</span>

                    <!-- Progress Bar -->
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3 overflow-hidden">
                        <div id="bar-tasks" class="bg-purple-500 h-full rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Kerajinan -->
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden group">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-8 h-8 rounded-lg bg-orange-100 text-orange-600 flex items-center justify-center">
                            <i class="fa-solid fa-fire"></i>
                        </div>
                        <h4 class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Kerajinan</h4>
                    </div>
                    <span class="text-2xl font-black text-slate-800" id="stat-diligence">0</span>
                    <p class="text-[10px] text-slate-400 mt-1 leading-tight">Poin pengerjaan tugas</p>
                </div>
            </div>
        </div>

        <!-- Settings / Menu -->
        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 overflow-hidden">
            <a href="#"
                class="flex items-center gap-4 p-5 hover:bg-slate-50 transition-colors border-b border-slate-50">
                <div class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                    <i class="fa-solid fa-user-pen"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800">Edit Profil</h4>
                    <p class="text-xs text-slate-400">Ubah biodata diri</p>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300"></i>
            </a>

            <a href="login.html" id="auth-btn"
                class="flex items-center gap-4 p-5 hover:bg-red-50 transition-colors group">
                <div
                    class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center group-hover:bg-red-200 transition-colors">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-red-600">Keluar</h4>
                    <p class="text-xs text-red-400">Logout dari akun</p>
                </div>
            </a>
        </div>

        <p class="text-center text-xs text-slate-400 mt-8">Versi Aplikasi v2.0 (Mobile Redesign)</p>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="profil.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-bold">Profil</span>
        </a>
    </nav>

    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = typeof checkAuth === 'function' ? checkAuth() : null;

            if (user) {
                document.getElementById('user-name').innerText = user.nama || 'Mahasiswa';
                document.getElementById('user-nim').innerText = user.nim || '---';

                // Profile Pic
                const picEl = document.getElementById('profile-pic');
                if (user.profile_photo_url) {
                    picEl.innerHTML = `<img src="${user.profile_photo_url}" class="w-full h-full object-cover">`;
                }

                document.getElementById('auth-btn').onclick = (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user_session');
                    window.location.href = 'login.html';
                };

                // Load Stats
                loadStats(user);

            } else {
                document.getElementById('auth-btn').innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-blue-600">Masuk / Login</h4>
                        <p class="text-xs text-blue-400">Akses fitur penuh</p>
                    </div>
                 `;
                document.getElementById('auth-btn').href = 'login.html';
                document.getElementById('auth-btn').onclick = null;
            }
        });

        async function loadStats(user) {
            if (!window.supabaseClient) return;

            try {
                // 1. Kehadiran
                // Count how many meeetings exist total
                const { data: allMeetings } = await supabaseClient.from('attendance_logs').select('meeting_code', { count: 'exact', head: false });
                // Simple version: Count specific user's 'Hadir' logs
                const { count: presentCount } = await supabaseClient.from('attendance_logs')
                    .select('*', { count: 'exact' })
                    .eq('student_nim', user.nim)
                    .eq('status', 'Hadir');

                // Estimate total meetings: distinct count of meeting_code globally or for this user. 
                // Better: Get distinct meeting codes from all logs.
                // For now, let's assume 16 meetings max, or calculate dynamically if possible.
                // Dynamic approach:
                const { data: distinctMeetings } = await supabaseClient.rpc('get_distinct_meetings'); // If RPC exists
                // Fallback: Just assume standard 16 meetings for semester? Or just count user's logs vs total class logs?
                // Let's use a simpler heuristic: Total meetings = unique meeting_codes in database.
                let totalMeetings = 0;
                const { data: meetingsData } = await supabaseClient.from('attendance_logs').select('meeting_code');
                if (meetingsData) {
                    const unique = new Set(meetingsData.map(m => m.meeting_code));
                    totalMeetings = unique.size;
                }
                if (totalMeetings === 0) totalMeetings = 1; // Avoid NaN

                const attendancePct = Math.round((presentCount / totalMeetings) * 100) || 0;
                document.getElementById('stat-attendance').innerText = `${attendancePct}%`;
                document.getElementById('bar-attendance').style.width = `${attendancePct}%`;


                // 2. Partisipasi (Points manually given)
                const { data: participationData } = await supabaseClient.from('participation_logs')
                    .select('points')
                    .eq('student_nim', user.nim);

                const totalParticipation = participationData ? participationData.reduce((acc, curr) => acc + (curr.points || 0), 0) : 0;
                document.getElementById('stat-participation').innerText = totalParticipation;


                // 3. Tugas Selesai
                // Need to know how many assignments exist
                const { count: totalTasks } = await supabaseClient.from('assignments').select('*', { count: 'exact' }).eq('is_active', true);

                // Need to know how many submissions this user has made
                // Check if 'assignment_submissions' exists
                let submittedCount = 0;
                try {
                    const { count } = await supabaseClient.from('assignment_submissions')
                        .select('*', { count: 'exact' })
                        .eq('student_nim', user.nim);
                    submittedCount = count || 0;
                } catch (e) { console.warn("No submissions table", e); }

                document.getElementById('stat-tasks').innerText = `${submittedCount}/${totalTasks}`;
                const taskPct = totalTasks > 0 ? Math.round((submittedCount / totalTasks) * 100) : 0;
                document.getElementById('bar-tasks').style.width = `${taskPct}%`;


                // 4. Kerajinan (Diligence)
                // Tiap tugas dikerjakan = 10 poin (User Request)
                const diligencePoints = submittedCount * 10;
                document.getElementById('stat-diligence').innerText = diligencePoints;

            } catch (e) {
                console.error("Error loading stats", e);
            }
        }
    </script>
</body>

</html>
