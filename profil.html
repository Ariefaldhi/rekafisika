<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya | FisikaLab</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B', sub: '#64748B' }
                    },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text min-h-screen pb-24 selection:bg-primary-500/30">

    <!-- Header (No Sticky, cleaner look for profile) -->
    <div class="px-6 pt-12 pb-6 bg-white shadow-sm mb-4">
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Profil Saya</h1>
    </div>

    <!-- Profile Card -->
    <main class="px-6 space-y-6">

        <!-- User Info -->
        <div
            class="bg-white p-6 rounded-3xl shadow-soft border border-slate-100 flex flex-col items-center text-center">
            <div id="profile-pic"
                class="w-24 h-24 rounded-full bg-slate-100 flex items-center justify-center text-3xl font-bold text-slate-300 mb-4 border-4 border-slate-50 relative">
                <i class="fa-solid fa-user"></i>
                <!-- Edit Button -->
                <button
                    class="absolute bottom-0 right-0 w-8 h-8 bg-primary-500 text-white rounded-full flex items-center justify-center text-sm shadow-md hover:bg-primary-600 transition-colors">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>

            <h2 id="user-name" class="text-xl font-bold text-slate-900">Tamu</h2>
            <p id="user-nim" class="text-slate-400 text-sm font-mono mb-6">Belum Login</p>

            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="bg-blue-50 p-4 rounded-2xl">
                    <span class="block text-2xl font-bold text-blue-600">0</span>
                    <span class="text-xs text-blue-400 font-bold uppercase">Modul</span>
                </div>
                <div class="bg-purple-50 p-4 rounded-2xl">
                    <span class="block text-2xl font-bold text-purple-600">0</span>
                    <span class="text-xs text-purple-400 font-bold uppercase">Poin</span>
                </div>
            </div>
        </div>

        <!-- Settings / Menu -->
        <div class="bg-white rounded-3xl shadow-soft border border-slate-100 overflow-hidden">
            <a href="#"
                class="flex items-center gap-4 p-5 hover:bg-slate-50 transition-colors border-b border-slate-50">
                <div class="w-10 h-10 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                    <i class="fa-solid fa-user-pen"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-slate-800">Edit Profil</h4>
                    <p class="text-xs text-slate-400">Ubah biodata diri</p>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-300"></i>
            </a>

            <a href="login.html" id="auth-btn"
                class="flex items-center gap-4 p-5 hover:bg-red-50 transition-colors group">
                <div
                    class="w-10 h-10 rounded-full bg-red-100 text-red-600 flex items-center justify-center group-hover:bg-red-200 transition-colors">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-red-600">Keluar</h4>
                    <p class="text-xs text-red-400">Logout dari akun</p>
                </div>
            </a>
        </div>

        <p class="text-center text-xs text-slate-400 mt-8">Versi Aplikasi v2.0 (Mobile Redesign)</p>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 w-full bg-white border-t border-slate-200 py-3 px-6 z-50 flex justify-between items-center shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <a href="index.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-medium">Beranda</span>
        </a>
        <a href="modul.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Jelajah</span>
        </a>
        <a href="keaktifan.html"
            class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary-500 transition-colors">
            <i class="fa-solid fa-trophy text-xl"></i>
            <span class="text-[10px] font-medium">Peringkat</span>
        </a>
        <a href="profil.html" class="flex flex-col items-center gap-1 text-primary-500">
            <i class="fa-regular fa-user text-xl"></i>
            <span class="text-[10px] font-bold">Profil</span>
        </a>
    </nav>

    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = typeof checkAuth === 'function' ? checkAuth() : null;

            if (user) {
                document.getElementById('user-name').innerText = user.nama || 'Mahasiswa';
                document.getElementById('user-nim').innerText = user.nim || '---';
                document.getElementById('auth-btn').onclick = (e) => {
                    e.preventDefault();
                    localStorage.removeItem('user_session');
                    window.location.href = 'login.html';
                };
            } else {
                document.getElementById('auth-btn').innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-blue-600">Masuk / Login</h4>
                        <p class="text-xs text-blue-400">Akses fitur penuh</p>
                    </div>
                 `;
                document.getElementById('auth-btn').href = 'login.html';
                document.getElementById('auth-btn').onclick = null;
            }
        });
    </script>
</body>

</html>
