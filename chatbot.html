<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diskusi AI | KawanFismat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: '#3B82F6', 600: '#2563EB' },
                        ui: { bg: '#F8FAFC', text: '#1E293B' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Marked & MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        .chat-bubble {
            max-width: 85%;
            border-radius: 1.5rem;
            padding: 1rem 1.25rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
    </style>
    <script src="config.js?v=2.5"></script>
</head>

<body class="bg-ui-bg font-inter text-ui-text h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-100 p-4 flex items-center justify-between shrink-0 z-20">
        <a href="index.html"
            class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500 hover:bg-slate-100 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="flex flex-col items-center">
            <h1 class="font-bold text-slate-800">Asisten Dosen AI</h1>
            <span class="text-[10px] text-green-500 font-medium flex items-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Online
            </span>
        </div>
        <div class="w-10 h-10"></div> <!-- Spacer -->
    </header>

    <!-- Chat Area -->
    <main class="flex-grow flex flex-col relative w-full h-full overflow-hidden bg-slate-50/50">
        <div id="chat-history" class="flex-grow overflow-y-auto p-4 space-y-6 custom-scrollbar pb-24">

            <!-- Welcome -->
            <div class="flex flex-col items-center justify-center py-10 text-center opacity-70">
                <div
                    class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-2xl mb-4">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <p class="text-sm text-slate-500 max-w-xs">
                    Halo! Saya siap bantu jawab pertanyaan seputar Fisika Matematika I.
                </p>
            </div>

            <!-- Example Bot Msg -->
            <div class="flex gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-blue-100 flex-shrink-0 flex items-center justify-center text-blue-600 text-xs font-bold border border-blue-200">
                    AI</div>
                <div
                    class="chat-bubble bg-white text-slate-700 border border-slate-100 rounded-tl-none prose prose-indigo prose-sm max-w-none">
                    Silakan tanya materi apa saja! 😊
                </div>
            </div>

        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full bg-white border-t border-slate-100 p-3 pb-6 sm:pb-3">
            <div
                class="max-w-3xl mx-auto flex items-end gap-2 bg-slate-50 rounded-[2rem] p-1.5 border border-slate-200 focus-within:border-blue-300 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                <textarea id="chat-input" rows="1"
                    class="w-full bg-transparent text-slate-800 placeholder-slate-400 px-4 py-3 focus:outline-none resize-none max-h-32 text-sm"
                    placeholder="Ketik pesan..."></textarea>
                <button id="send-btn"
                    class="w-10 h-10 rounded-full bg-primary-600 text-white flex items-center justify-center hover:bg-primary-500 transition-colors shadow-md mb-0.5 mr-0.5">
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        if (typeof supabase === 'undefined') {
            document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2"></scr' + 'ipt>');
        }
    </script>

    <script>
        const chatHistory = document.getElementById('chat-history');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        let isProcessing = false;

        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isProcessing) return;

            if (!GROQ_API_KEY || GROQ_API_KEY.includes("PASTE_")) {
                appendMessage('bot', "⚠️ API Key belum disetting.");
                return;
            }

            appendMessage('user', text);
            chatInput.value = '';
            chatInput.style.height = 'auto';
            isProcessing = true;
            sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                // Re-using logic but matching style
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: "Lo adalah asisten dosen Fisika Matematika yang seru. Format rumus pake LaTeX ($$ ... $$)." },
                            { role: "user", content: text }
                        ],
                        model: "llama-3.3-70b-versatile",
                        temperature: 0.6
                    })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                appendMessage('bot', reply);
            } catch (e) {
                appendMessage('bot', "Maaf, koneksi terputus.");
            } finally {
                isProcessing = false;
                sendBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');

            if (role === 'user') {
                div.className = "flex gap-3 flex-row-reverse animate-fade-in";
                div.innerHTML = `
                   <div class="chat-bubble bg-primary-600 text-white rounded-tr-none shadow-md shadow-blue-500/20">
                       ${text.replace(/\n/g, '<br>')}
                   </div>
                `;
            } else {
                div.className = "flex gap-3 animate-fade-in";
                const content = marked.parse(text);
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex-shrink-0 flex items-center justify-center text-blue-600 text-xs font-bold border border-blue-200 mt-auto">AI</div>
                    <div class="chat-bubble bg-white text-slate-700 border border-slate-100 rounded-tl-none prose prose-indigo prose-sm max-w-none shadow-sm">
                        ${content}
                    </div>
                `;
            }
            chatHistory.appendChild(div);
            if (window.MathJax && role === 'bot') MathJax.typesetPromise([div]);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>

</html>
